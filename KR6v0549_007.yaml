body:
  text: 天台山幽溪沙門傳燈撰台教考第八教者聖人化下之言有一代之聖人必有一代之教法天台智者大師師事於南嶽宗承於中論妙悟於法華故説法四十餘年章安結集教觀之文數十萬言粲然日星莫不以法華而為宗承蓋法華者一代化法之極談見性成佛之祕要也嘗原此經所談如來出興於世惟為一事更無他事所謂欲令衆生開示悟入佛之知見且知見一也而有衆生諸佛之分何耶如來開示不開示衆生悟入不悟入故也法華已前如來豈不開示衆生豈無悟入以有大小之殊漸頓之別未悟一地所生一雨所潤無小無大皆歸法界之旨故須歸功於法華也若此經所説諸法實相諸則何所不該實則何所不妙開三乘為一乘會十界為一界將使華嚴失專頓之榮阿含忘恥小之辱方等彈斥無所施其功般若淘汰無所用其力大事因緣良有以也稱為妙法又何讓焉然則諸法實相固一經之關鍵開會之指南如來于經首已默示之矣經云如來入于無量義處三昧身心不動無量義處即諸法實相也入此三昧即法華三昧之異稱也故知序品為正作序正宗所宣舉不外是第默非説不知説非默不會所以如來從三昧起而有説焉然默者默其説也説者説其默也默而後説豈有他法亦惟説此無量義處三昧而已其説者何曰諸佛智慧甚深無量其智慧門難解難入曰惟佛與佛乃能究盡諸法實相曰是法非思量分別之所能解既云諸法實相則法法頭頭無非成現無一毫可加損於其間者禪人所謂本來面目是也而云惟佛與佛乃能究盡則知此非衆生情量境界要必諸佛智慧甚深無量斯能究盡也大師云𥪡徹真如之底曰甚深橫亘法界之邊曰無量真如有底乎法界有邊乎此即無底之底無邊之邊如來以無底際智究實相真如之底盡諸法法界之邊所謂函大蓋亦隨大以此而求如來智慧庶可蠡測諸法實相亦少蹄勺且親切一句如來如何為人豈不曰是法非思量分別之所能解耶是以如來將欲説此不思議妙法先入此不思議妙定使人有以默識之也既曰非思量分別故知欲究盡諸法實相者直不可用思量分別此即如來直示人入無念心體處如禪宗初祖云外息諸緣內心無喘心如牆壁可以入道三祖信心銘云至道無難惟嫌揀擇但莫憎愛自然明白六祖云不思善不思惡於麼時阿那箇是明上座本來靣目又云汝欲知心要但一切善惡都莫思量即自然得入清淨心體湛然常住妙用恆沙須知入此無念心體有寂照兩門如向所説但是寂門蓋非寂無以顯體禪宗諸祖既欲直指人心見性成佛故令人寂其思量使真常獨露一得永得更不失念一切恆沙功德自然發現不言照而照在其中此所謂快馬見鞭影即入正路者也若夫中下之流雖得明心見性然有無始習氣苟不明寂照雙融之功如永嘉所謂寂寂不惺惺則生昏睡惺惺不寂寂則生亂想故曰寂寂惺惺是亂想惺惺非惺惺寂寂是無記寂寂非蓋寂則寂其慮想照則照其靈明慮想寂而靈明曜寂斯照矣靈明顯而慮想忘照斯寂矣然則何寂而不照何照而不寂此又得魚忘筌者也但寂之為言雖易明心見性則難中下之流未免墮入空坑寂穽之中以此認為心性何異認魚目當明珠指山雞作鸞鳳故初祖懸鑒此類乃曰吾有楞伽四卷亦用付汝即是如來心地要門令諸衆生開示悟入蓋惟佛與佛乃能究盡諸法實相憑經而悟方為把本參禪永無錯路不然豈但墮入小乘乃亦化作天魔外道古德所謂無量劫來生死本癡人喚作本來人是也故楞嚴經云一切衆生從無始來種種顛倒諸修行人不成菩提乃至別成二乘外道天魔皆由不知二種根本錯亂修習云云矧性之為言雖略性之為德蓋有性體性量性具之目諸宗之言性極其玄詣惟性體性量若曰性具未聞其指惟吾智者大師靈山宿聞大蘇妙悟照了法華若朝曦之臨萬象達諸法相似清風遊於太虛説己心中所證法門有教可憑離暗證之譏有觀可入無循文之失命其家曰天台立其宗曰性具其餘法門綱格盤峙固多所籠罩非此可盡略舉其要如十乘觀法其目曰第一觀不思議境第二真正發菩提心第三善巧安心止觀第四破法遍第五識通塞第六道品調適第七對治助開第八知位次第九能安忍第十離法愛此十法被三根人上根惟一中根二至七下根全用第一準諸法實相是法非思量分別之所能解而立譬喻品所謂其車高廣是也第二準於一切衆生中起大慈心於非菩薩人中起大悲心而立譬喻品所謂張設幰蓋是也第三準如其所得法定慧力莊嚴而立譬喻品所謂安置丹枕是也其餘準經具如後列故知上根之人惟觀不思議境即便悟入佛之知見此與禪宗示人入無念心體是同若夫安心止觀乃寂照惺寂之異稱為中下之根又不得不設或曰教外別傳不立文字何教之有余因反詰之曰世尊未拈華之先有教外別傳耶無教外別傳耶有則得傳非止於迦葉若其無者有人悟道耶無人悟道耶有則何專貴于別傳文字有性耶無性耶有則俱有花亦文字也無則俱無文字亦花也永明云煙柯月渚並可傳心又何獨花與文字哉須知佛祖説法使人解粘去縛如以楔出楔世人縛著文字如楔也不立文字如第二楔也楔既出矣是楔亦出若執楔成礙佛祖復有第三楔矣故禪宗雖云不立文字初傳則有楞伽後五六葉則尚般若此祖師懸鑒後人先已設此楔矣況教無等等何外之有文字非真非妄乃以何者為文字維摩詰云無離文字説解脫相則不立文字猶是第二門頭邊事或又曰直指人心見性成佛何觀之有余亦反詰之曰明心見性之人為與釋迦如來同居究竟耶未耶若已究竟故不須觀若未究竟尚有無始微細習氣須寂須照宜定宜慧故經云等覺照寂妙覺寂照止觀寂照蓋同出而異名未臻極位者請事斯語無為空言而自誣也且夫聖人設教因時因根當機得益不能無弊若華嚴有隔小之失阿含無被大之功方等小大不融般若偏圓未會惟法華以一味雨潤於人華故大事因緣於茲方暢佛世既然後代亦爾惟吾大師間生像世為如來使行如來事其為教也稟法華而圓會則括海藏皆至當之言其為觀也以佛慧而普觀則盡法門無不圓之行以空而蕩著則一空一切空十界俱空尚不著佛而求況餘乘乎以假而立法則一立一切立十界皆立究竟蛣𧏙理毒性惡無一法非遮那妙體況佛界乎以中而統法則一統一切統蕩亦法界立亦法界非蕩非立皆是法界無不可者譬如神通聖人履空如地入地如水於五大性轉變自在豈與夫偏空偏假蕩則惟蕩與立為讐立則惟立與蕩為敵同年而語哉須知祖師立教各有所主蓋如來説法常依二諦故禪門多宗於蕩著台教多宗於立法因時救弊不得不然祖意聖心無不融會惟後代兒孫執法成病為可悲耳今略列教觀大綱及教觀目録庶從事斯道者有以考焉教觀大綱附清規教門釋迦如來説法四十九年適時而進天台判釋凡為五時一最初成道於三七日説華嚴經謂之華嚴時二於鹿苑十二年中説四阿含小乘經謂之阿含時三於諸處八年中説諸大乘經彈偏斥小歎大褒圓謂之方等時四於舍衛國諸處二十二年中説諸部般若謂之般若時五於耆闍崛山并娑羅雙樹間八年中説法華涅槃經謂之法華涅槃時五時所説不出八教八教者頓漸祕密不定藏通別圓頓等四教是為化儀如世藥方藏等四教是為化法如辨藥味判五時粗妙華嚴兼粗説妙阿含但粗無妙方等對粗説妙般若帶粗説妙法華純妙無粗化儀四教頓者頓大之教不從漸來正説於大即華嚴也漸者從淺之深次第得益即初鹿苑次方等三般若也祕密者佛或為此人説頓或為彼人説漸彼此互不相知能令得益橫在四時別無部帙不定者佛以一音演説法衆生隨類各得解於頓説中得漸益於漸説中得頓益亦橫在四時別無部帙化法四教藏者經律論三藏條然不同三人修諦緣度析色入空通者通前藏教通後別圓三人同以無言説道體色入空別者別前藏通別後圓教界外獨菩薩法修行位次互不相攝圓者圓名圓妙圓頓圓足明不思議因緣二諦中道事理具足但化最上利根之人四教化人旁正藏教正化二乘旁化菩薩通教正化菩薩旁化二乘別教獨菩薩法圓教方為佛法四教詮理化物廣狹藏通詮真理化六凡改惡遷善革凡成聖別圓詮中理化十界俱成佛道藏教四諦苦則三相遷移集則四心流動道則對治易奪滅則滅有歸無迷真重故從事得名通教四諦苦無逼迫相集無和合相道不二相滅無生相迷真輕故從理得名別教四諦苦有無量相十界果報不同集有無量相五住煩惱不同滅有無量相諸波羅蜜不同道有無量相恆沙佛法不同迷中重故從事得名圓教四諦陰入皆如無苦可得塵勞本清淨無集可斷邊邪皆中正無道可修生死即涅槃無滅可證迷中輕故從理得名八種四教一漸中開四如破他宗不識教體之妨謂法華是漸圓華嚴是頓圓二方等中四四教並談曰方四機普被曰等三別教𥪡入四十信修生滅四諦藏十住無生四諦通十行無量四諦別十向無作四諦圓四十行橫學四別教十行化他心切橫出四四一十六門五涅槃追泯四生生不可説藏生不生不可説通不生生不可説別不生不生不可説圓六涅槃追説四有因緣故亦可得説四句如前但義同施權卻更分別前四教也七法華施出四從法華實理施四時三教權理明無量義從一清淨道施出二三四八法華開顯四開四時三教歸今法華收多歸一也五時四教筌魚兔一約部義前四時筌罤今法華魚兔二約教義前三教筌罤今圓教魚兔三約解義言説教筌罤契妙理魚兔四約行義玄句開解筌罤止觀立行魚兔五約玄義釋名宗用教筌罤諸部經體魚兔釋經首題五重玄義一釋名名為一部之總不尋能詮之名焉悟所詮之體故名居先二辨體因筌得魚尋名顯體得體而後忘名苟不辨之知得何體三明宗即得體已須修宗行見道修道宗要當明四論用宗既歸體必起大用佛説是經蓋得乎此此經力用次當論之五判教相名為能詮三為所詮能所之教必有其相頓漸大小法當剖判法華五章法喻為名妙法是法蓮華是喻實相體十界十如之法一一離相絶非一乘因果宗衆善為因自行言果是佛自行因果斷疑生信用迹門開顯斷權疑生實信本門開顯斷近疑生遠信無上醍醐教相此經純圓故喻醍醐逈異偏小餘味故法華二妙一相待論妙待前四時三教之粗獨顯法華一乘之妙二絶待論妙妙前諸粗皆成今妙無粗可論故稱為絶法華本迹因果開合圓教六即判位無機子頌理即佛一切衆生皆有佛性動靜理全是行藏事盡非冥冥隨物去杳杳不知歸名字即佛知識經卷聞名知字方聽無生曲始聞不死歌今知當體是翻恨自蹉跎觀行即佛依教修行即五品位念念照常理心心息幻塵遍觀諸法性無假亦無真相似即佛相似解發即十信位四住雖先脫六塵未盡空眼中猶有翳空裏見花紅分真即佛分破分證初住至等覺豁爾心開悟湛然一切通窮源猶未盡常見月朦朧究竟即佛智斷圓滿即妙覺位從來真是妄今日妄皆真但復本時性更無一法新觀門三諦真諦者泯一切法俗諦者立一切法中諦者統一切法三觀空觀者破見思惑顯真諦理假觀者破塵沙惑顯俗諦理中觀者破無明惑顯中諦理纓絡三觀一從假入空觀亦名二空觀二從空入假觀亦名平等觀三因二空方便入中道第一義觀天台三止一體真止止於真諦二方便隨緣止止於俗諦三息二邊分別止止於中道第一義諦一心中三止觀一空一切空無假無中而不空總空觀一假一切假無空無中而不假總假觀一中一切中無假無空而不中總中觀南嶽三種止觀漸次初淺後深如梯隥不定前後更互如金剛寶置於日中圓頓初後不二如通者騰空天台三種止觀漸次禪波羅蜜十卷初淺後深解頓行漸隨他空不定六妙門一卷前後更互解頓行或漸頓隨自他假圓頓摩訶止觀十卷初後不二行解俱頓隨自中修止觀前二十五方便一具五緣一持戒清淨在家出家大小不同二衣食具足蔽形即足隨食資身三間居靜處不作衆事名無憒鬧四息諸緣務生活人事工巧伎術五近善知識外護同行教授三種二訶五欲一呵色欲男女行貌玄黃朱紫二呵聲欲𮈔竹環珮男女歌詠三呵香欲男女身香飲食香等四呵味欲飲食肴膳種種美味五呵觸欲男女身分及諸好觸三棄五蓋一貪欲蓋追昔五欲忘失正念二嗔恚蓋想他惱我忿怒相續三睡眠蓋心神昏塞烏暗沉黑四掉悔蓋作無益事心中憂悔五疑蓋非障理疑乃障定疑四調五事一調心不沉不浮沉繫鼻端浮安心下二調身不緩不急挺動肢節正頭直項三調息不澀不滑氣息若調則易入定四調眠不節不恣不可苦節復不可縱五調食不飢不飽安身愈疾處中得宜五行五法一欲欲離妄想顛倒欲得禪定智慧二精進持戒棄蓋初中後夜勤行精進三念念世欺誑可輕賤禪定智慧可重貴四巧慧籌量世間樂禪定智慧樂得失輕重五一心念慧分明見世間可患定慧可貴十乘觀法一觀不思議境謂觀一念心具足三千性相即空即假即中更不前後廣大圓滿橫𥪡自在故法華經云其車高廣二真正發菩提心謂依上妙境發無作四弘誓願愍己愍他上求下化經云又於其上張設幰蓋三善巧安心止觀謂體妙理常恆寂然名為定寂而常照名為慧經云安置丹枕四破法遍謂以三觀破三惑三觀一心無惑不破經云其疾如風五識通塞謂苦集十二因緣六蔽塵沙無明為塞滅滅因緣智六度一心三觀為通若通須護有塞須破經云其疾如風六道品調適謂無作道品一一調停隨宜而入經云有大白牛等七對治助開謂若正道多障圓理不開須修事助謂五停心及六度等經云又多㒒從八知位次謂修行之人知六即位次既不生上慢亦不生退屈經云乘是寶乘遊於四方九能安忍謂於逆順安然不動策進五品而入六根引經同前十無法愛謂莫著十信相似之道須入初住真實之理引經同前十境三障四魔清規天台大師立制法夫新衣無孔不可補之以縷宿殖淳善不可加之以罰吾初在浮度中處金陵前入天台諸來法徒各集道業尚不須軟語勸進況立制肅之後入天台觀乎晚學如新猿馬若不控鎖日甚月增為成就故失二治一蒲鞭示恥非欲苦之今訓諸學者略示十條後若妨起應須增損衆共裁之第一夫根性不同或獨行得道或依衆解脫若依衆者當修三行一依堂坐禪二別場懺悔三知僧事此三行人三衣六物道具具足隨有一行則可容受若衣物有闕都無一行則不同止第二依堂之僧本以四時坐禪六時禮佛此為恆務禪禮十時一不可闕其別行僧行法竟三日外即應依衆十時若禮佛不及一時罰三禮對衆懺若全失一時罰十禮對衆懺若全失六時罰一次維那四時坐禪亦如是除疾礙先白知事則不罰第三六時禮佛大僧應被入衆衣衣無鱗隴若縵衣悉不得三下早集敷坐執香爐胡跪未唱誦不得誦未隨意不散語話叩頭彈指頓曳屣履起伏參差悉罰十禮對衆懺第四別行之意以在衆為緩故精進勤修四種三昧而假託道場不稱別行之意檢校得實罰一次維那第五其知事之僧本為安立利益反作損耗割衆潤己自任恩情若非理侵一毫雖是衆用而不開白檢校得實不同止第六其二時食者若身無病病不頓臥病已差皆須出堂不得請食入衆食器聽用鐵瓦薰油二器甌碗匙筯悉不得以骨角竹木瓢染皮蚌悉不得上堂又不得摚觸己鉢吸啜等聲含食語話自為求索私將醬菜衆中獨噉犯者罰三禮對衆懺第七其大僧小戒近行遠行寺內寺外悉不得盜噉魚肉辛酒非時而食察得實不同止除病危篤瞻病用醫語出寺外投治則不罰第八僧名和合柔忍故和義讓故合不得諍計高聲醜言動色兩競者各罰三十拜對衆懺不應對者不罰身手互相加者不問輕重皆不同止不動手者不罰第九若犯重者依律治若橫相誣被誣者不罰作誣者不同止若學未入衆時過衆主不受學衆未攝故彼自言比丘故入衆來犯重誣他者治罰如前第十依經立方見病處藥非於方吐於藥有何益乎若上來九制聽懺者屢懺無慙愧心不能自新此是吐藥之人宜令出衆若能改革後亦聽還若犯諸制捍不肯懺此是非方之人不從衆綱則不同止太祖聖諭參用內典夫叢林以安衆為務安衆以清規為要一無清規將使師不師弟不弟兄友之義亦乖法屬之情盡絶佛法掃地矣叢林云乎哉不慧濫登講座相從者頗衆所謂大林之荊棘大田之莨莠何物無之苟不預為耘斫其疾嘉木敗大本為害者不小然準佛法而治無智者反迂而不信憑官法而訟有識者又恥而不録今皇法佛法相參為用謹遵洪武聖諭六條高書於上以內典之意通釋於下使知機者自知退避何必待斧斤然後為快哉孝順父母在家二親生肉身之父母也出家師長生法身之父母也生身父母之恩當報法身父母之恩可忤逆乎有違此諭者不許共住尊敬長上在家長上伯叔兄長之類也出家長上師伯叔兄長之類也在家長上宜尊出家長上可慢乎有違此諭者不許共住和睦鄉里鄉里一鄉一里比鄰之親友也出家則以義而聚天下四海孰非鄉里其或不以六和處衆而且鬬搆是非自作教人殊失融通之道有違此諭者不許共住教訓子孫徒屬出家之子孫也先以世道教以義方後以佛法鎔其性地其有事徒如事師視師如視徒此絶倫理之人也不許共住各安生理世之生理士農工商也出世生理繕性則資以三學所謂戒定慧也養身則助以四事所謂飲食衣服臥具醫藥也佛制出家當依三法一者循方持鉢二者信心檀越淨施三者依棲叢林説淨而受有違此而別行生理者不許共住毋作非為遵前五諭事事皆是違前五諭件件皆非殺淫欺妄姦盜詐偽靡所不為矣有違此諭不許共住教觀目録附石室藏書南嶽大乘止觀二卷唐末教典流散海外本朝咸平三年日本國寂照持此本至四明慈雲得之為作序云初卷開止觀之解次卷示止觀之行四十二字門二卷大品四十二字初阿後荼南嶽用對四十二位安樂行義一卷四明行皎遊方至南嶽福嚴於藏中得此本歸以示圓辨其後北峯石芝始獲開板南嶽願文一卷無諍行門二卷三智觀門次第禪要釋論玄已上各一卷右止觀安樂行義願文有見本餘不復見惜哉天台法華玄義十卷法華文句十卷摩訶止觀十卷名圓頓止觀禪波羅蜜十卷名漸次止觀修禪六妙門一卷名不定止觀智者為陳尚書令毛喜撰光明玄義一卷解曇無讖譯四卷別行之本光明文句三卷菩薩戒疏二卷觀音別行玄義二卷釋法華普門一品別行部外昔曇無讖勸河西王誦持愈疾故智者特釋觀音別行義疏二卷請觀音經疏一卷觀無量壽佛經疏一卷觀心論一卷金剛般若經疏一卷建炎二年武林修悟將此疏入經為注咸淳元年南湖行靖等將天台法輪院科金剛經并疏刊板于寺四念處四卷彌陀經義疏一卷金剛彌陀二疏雖曾入藏而孤山淨覺謂是附托之文唯神照法師嘗於法輪用此疏講有宣賜本在東山藏中禪門口訣一卷覺意三昧一卷智者親撰方等三昧儀一卷法華三昧儀一卷法界次第三卷已上皆親撰維摩玄疏六卷四教義四卷維摩玄疏離出之文右七十六卷天聖二年慈雲奏入大藏維摩文疏二十八卷為煬帝撰荊溪略為十卷但稱略疏與前玄疏各行淨土十疑論觀心食法觀心誦經法觀心十二部經義小止觀右共三十三卷未入藏智度論疏二十卷彌勒成佛經疏五卷觀心釋一切經義一卷彌勒上生經疏一卷釋一切經玄義一卷坐禪止觀一卷仁王般若經疏二卷天竺別集云元豐初得之海賈禪門章般舟行法雜觀行入道大旨五方便門七方便義七學人義一二三四身義法門儀禪門要略已上各一卷右四十一卷闕本慈雲隨函録云法華玄義者唯解首題統明五時廣辨八教出世大意蘊在其中文句者以疏句分節經文荊溪云以由釋題大意委悉故至經文粗分章段隨部各有荊溪之記猶五經之有正義也止觀者定慧之異名法華之行門也前玄義文句皆明佛世當機得益之事縱有托事附法觀心之文非部正意今止觀正是智者説己心中所行法門自行因果化他能所無不具焉荊溪以輔行釋之目録云今家有三種止觀一曰漸次謂解頓行漸即禪波羅蜜是也二曰不定謂解頓行或頓或漸即六妙門是也三曰圓漸謂解行俱頓即摩訶止觀是也此三止觀對根不同行相雖殊俱依圓理而為宗本唐梁肅刪止觀為六卷文雖簡要而修相多闕覽者宜知除智者親筆餘皆章安於法輪之下述為疏論也唐書藝文志云灌頂私記智者詞旨一卷義記一卷今未詳何文釋籤云止觀禪門淨名疏等各有餘分説未終者文案止觀云智者於玉泉寺一夏敷揚二時慈霔雖樂説不窮才至見境法輪停轉後分弗宣輔行云大章第七開為十境至第七境餘不復宣後三大章及餘三境時逼夏終於茲罷唱次第禪門即禪波羅蜜忽列十大章於第六方便文中注云若論初禪已後發諸禪定深妙境界並在第七修證中説此文皆悉不流通也淨名經十四品大師疏解止佛道品第八後諸品疏乃是章安述而續之章安涅槃玄義二卷涅槃經疏一十卷荊溪治定十五卷今十八卷觀心論疏二卷慈雲目録云考其所説知入品位然江浙名流或云疑偽智者別傳一卷國清百録五卷別傳百録是大師始終化迹八教大意一卷南嶽記一卷亡真觀法師傳一卷亡除亡本外有二十卷入藏荊溪玄義釋籤十卷文句記十卷止觀輔行十卷今開二十卷止觀義例一卷慈雲云為初學難解及破異論止觀大意一卷為司封李華出維摩略疏十卷略智者維摩文疏維摩廣疏六卷慈雲云對廣文雖少殊亦釋義宛合金剛錍論一卷明涅槃佛性義已上四十九卷同入大藏始終心要十不二門釋籤部外別行止觀搜要記十卷涅槃後分疏一卷亡觀心誦經記一卷亡三觀義授菩薩戒文亡止觀文句一卷亡華嚴骨目亡今東山有板二卷是海東復還者法華補助儀方等補闕儀龍興皓師涅槃經注天台曠師心經疏華頂滿師涅槃記十二卷靈光敏師光明玄義記廣教彧師光明玄金鼓記十疑論注石壁靖師觀經疏記奉先清師發揮記釋光明玄略本示珠指釋十不二門孤山圓師首楞嚴經疏十卷文殊般若經疏二卷不思議法門經疏阿彌陀經疏小本四十二章經疏瑞應經疏無量義經疏普賢行法經疏般若心經疏上各一卷遺教經疏二卷闡義鈔二卷釋請觀音經疏索隱記四卷釋光明文句百非鈔一卷釋涅槃疏金剛身百非義刊正記二卷釋觀經疏發源機要記一卷釋涅槃玄義垂裕記十卷釋淨名略疏二表徵記一卷釋光明玄三德指歸十卷釋涅槃疏顯性録四卷釋金錍正義一卷釋十不二門托華鈔二卷釋圭峯蘭盆疏西資鈔二卷釋自撰彌陀疏谷響鈔五卷釋自撰楞嚴經疏析重鈔一卷釋自撰文殊般若經疏大論析重令輕取此義詒謀鈔一卷釋自撰心經疏間居編五十一卷孤山年二十一始學于奉先清師及二年奉先亡遂往孤山杜門養病年四十七而化於二十四年著書百二十卷勤矣寶雲觀經疏記石芝云四明承用其義於妙宗鈔中故無可傳之文光明玄贊釋光明句備急鈔指南