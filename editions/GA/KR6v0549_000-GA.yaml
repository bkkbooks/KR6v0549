front:
  text: 序聞之地有得人以傳人有藉地以傳有其地有其人或不抱傳世心行傳世事地仍不傳人亦隨之湮沒良可慨已天台為浙省名勝智者大師定慧塔院在焉宋祥符間始改為真覺寺山川靈秀物產菁英披奇攬勝者題詠備矣千百年來廢興不一我朝咸同間赭寇竄逆浙台地當要衝戎馬蹂躪干戈擾攘寺遂燬於一炬時事使然爾然大師靈爽式憑鬼神呵護可證天心重道而我敏曦師繼起矣曦為大師四十世孫肇當年衣鉢示後學津梁光緒六年奮圖興築越九載寺成後賈餘勇籌刻天台續志自有明萬歷迄今垂三百年事奔走江淮集貲鳩工非有志者事竟成哉余不能無感焉世有擁厚資憑先業風塵轉徙幻影倏成奚屑力任艱辛備盛事以傳其人固無論也其或手剙門楣盛名虛享娛游晚歲幽忽以終其人又安在耶嗟夫曦師一衲子耳青年勵志白首窮經同志延之講解恆孜孜不倦平生布衣疏食跋涉山川年六十有四慨然曰某倦於遊矣將竣山志以終老乎曦師行乎哉天台寺多僧眾何獨任此巨力成此鉅功也其山崔巍而巉峩其人磊落而英多是之謂與書成用補數言簡端至其表惠禪門固別有可久可傳者在時為光緒十八年歲次壬辰十月誥授振威將軍前署湖南衡州協鎮壯勇巴圖魯兼襲雲騎尉壽春韓殿爵頓首撰書佛法從來不立文字自智祖以五時八教接人度世而後天台別為一宗葢由博會冥搜研精至理適致其極而實則與達磨大師旨歸仍同而不異余嘗讀祖語錄至靈山一會儼然未散語輒狂惑不得其解後讀湛堂和尚與大慧禪師所說薰風自南來殿閣生微涼話頭乃始豁然打失布袋爾時心中之樂誠有微妙不可思議者信古人之不我誑也敏師深通經教冥振元風杖履經行諸方共仰昔人嘗謂韶國師是智祖後身燈公又國師轉世以理推測師得無為燈公再來耶善乎燈公之言曰能忘乎山乃見夫道能忘乎道乃見夫山此其所以作為志書搜羅宏富隨文證義舉重若輕良由心體虛明行所無事今敏師為之重刻振錫一唱歡動諸天喜捨法財人人恐後彈指之頃告厥成功承接法流作將來眼詎非所謂如水入水如印印泥哉余世夢乍醒結習未盡比者過宿真覺瞻禮祖庭悲戀之深非可言喻洎乎舟過百步蓬牕無事取祖別傳讀之忽覺神風洒然被體更若法華三昧登時現前豈荷雲慈密相授記乎劣器下根常恐失墜乃蒙敏師愍其愚鈍時出一指來相提携適會書成又命檢校作序爰呈所解附託人天夫豈敢以文字言哉明明百草頭明明祖師意也時在光緒癸巳十月朔受菩薩戒優婆塞弟子始豐張邁并書重刻天台方外志叙余以光緒己卯游天台遍攬石梁華頂桐柏桃源諸勝於高明觀貝葉梵書於大慈獲修禪道場碑於方廣閱內府藏經而求明釋傳燈方外志不可得僅得化霖志要以歸其時智者墖院以頹廢不治為慨然者久之後官京師得徐靈府天台山記及燈公幽溪別志而方外志迄未得也去歲奉諱家居天台敏曦上人來訪出智者大師傳印本言墖院幸告成又得方外志原書將付刊乞為序余聞之合十贊歎喜台宗之將復振為有人矣按阮文達公序志要云化霖嘗請齊息園先生刪定而其書蕪襍失體疑是息園未定之稿乃屬嚴君杰比事属詞以吳郡志為㳒嘗攷燈公此書成於萬厤癸卯錢希言稱其學識高出道流甚有禪藻四庫提要亦言撰自釋家故稱述梵跡為多與專志山川者有別盖彼自用彼法詎必以史家地志繩之乎哉今曦公既復墖院為山中巨觀而又重刻是書所謂慧力過人能振其宗風者故不辭而為之叙歲在昭陽大芒駱七月既朢現掌四川道監察御史前翰林院編修國史館纂修黃巖楊晨書於京邸天台山方外志序夫中國名山有七而五嶽為尊天台山其南嶽之佐理乎昔大禹治水會天下諸侯於於越乃封其山為南鎮當是時置甌閩為蠻夷之地舟車阻絕疑天台者大禹未之至至則不封於越而封天台矣余昔讀孫興公賦彷彿名山倒影於重溟之上旁薄於霄漢之間足與五嶽七山埒後得剖符茲邑即津津色喜與名山有緣得為地道主焉爰自蒞任以來雖公事旁午簿書積案未嘗不握如意拄頰望霞標而耳瀑布至於美景良辰則又攜一二文學或采真於石梁或覽勝於華頂或登桐柏禮夷齊之像或過楢溪弔顧歡之宅一觴一詠信可樂也第名山洞府為仙釋之都會其中必多異人若白道猷葛孝先諸君者求之於今余非異人固未易知人之異求之於古余將誰質質之山靈山靈無言質之邑乘邑乘不詳余終將誰質哉乃山僧無盡法師示余以方外志其敘事該稽古博究理深為文則求諸辭達而已不以奇衒人釋氏固其所長仙宗亦復傍綜久住名山而形勝固伊家中物左提右挈東指西撝若登鴻臚而陳俎豆余喜斯志先得我心乃趣命剞劂以補邑乘之未備余觀古今著述互有詳畧為各有所主也夫邑乘志方內者也佛氏仙宗不妨聊爾並志志方外者也玄風釋理宜加詳焉兩者並行而不相害故知斯志又邑乘之佐理也因為之序賜進士第北京大理寺左評事前知天台縣事雲間王孫熙書於台嶽官舍天台山方外志序職方氏曰余守方內名嶽蓋有天台山焉上應泰符下禋星鳥黃潤為德青祇建元金土聚斗而陵衍沉太乙升堦而爵祿降宛弢躔次正襲紘維矣是以閭閻詠其克遜里俗識以始豐花縣松關七篇之諭美棠陰琪木五字之歌歡若乃賈直舒文屈忠江孝唐興秀而章俊天姥鬱其生楨超超往田攘攘倚市域中多戀興公憐之使吾有力負之而趨超不踰矩矩周其山也然而元聖忘山忘道遊化於茲闡士泯色泯空唱導於此福庭隱岳斯以稱焉恆河既覩琉璃皇基詎非佛國由夫纓絡自纏鳧舄束綦蟯客黃甯安知革表算米鹽於塵窌侈延旒於賁墉誰決愚籠必逢智印有大導師燈公者天宮蜚譽婺宿開祥枚引百松葉榮雙樹光幢繼日寺翳景而高明德瓶注雲溪伏流而幽隱眾仰足行經藏人呼皮裏法華太末道賓愈方袍之平叔勝果淨梵兼鍮鉢之言公道得智者膏腴近住神僊窟宅代興才子矢結金蘭國學儒英請揮玉麈楚鴻寶中之寶善逝天中之天雖三觀之內融曾一時之外學雲雨慈味笙簧道聲在山言山山是新伊中點知幻離幻幻成志外別傳萃五界於貫華總八峯於一軸分章二十十法以之成乘取策二三三教因之合轍每馳神而運思復遠寄以冥搜拓邑志之廣輪設圖經之彩繪正名軒牒溯源達池語本則山王之印文生採勝則妙德之冠影涉行滿飛錫處處仁祠道岸披圖人人賢位禪波合派於星海祖堂大祫於台垣陵再來而孔釋併韶應化而宗教一載培桐柏引配苾蒭右弼左玄金庭是集僊之都會歡溪察嶺玉京假天隱以衡門王侯屹峙金湯羽飛儼陳甲冑衛我教也綸音表而摩霄成汝名也金聲流而擲地人非昔而蹟在神不滅而塔懸以至酉陽之諾臯爰及庚除之唐述齊諧薈志慧皎異科太陽之草長生菩提之樹攝念莫不花生筠管藜燦藤箋執珠盤於秇壇傾銀河於口海吐玄亭之白鳳禦福三台驅相宅之青烏恥名一行若陳吳若宋謝空揭霞標若邕綽若理中虛張帆彩遙連越乘內折魯儒家有譜而野有謀近者知而遠者曉記載以來此為大方矣爾其毋越牧俎罔侵予宮語必烟霞人惟出世固已爇麟香而屏穢操犀導以辟埃然虎落時開鹿柴不守咲司馬過橋之悔嗤阮客還家之悲漫云朿足洗腸聊復招手饒舌亦以鶴林神訓綴萬剎於珂毫龍樹靈文洞干璣於珍網示一家性具之旨超孫生妙有之談斯則赤縣赤城並落硯池之蟣𮊁天堦天柱同含毛穎之兔塵巖岫徹于市朝在外無外廛廬通于寺觀即方離方瑤丘掩丹丘之房應真入養真之境瓊臺方廣英玄而象移芝草娑羅正倫澁而味變孤竹竟貪九州僕射南嶽須成五通僊人黃門一開惠虛偏行乎中道玉局三降寶瓊忍折乎幔幢陰巖之石能回國清之竈可破是為塵塵三昧字字真如六合版圖咸收冊府五車經史盡入石渠矣何妨名越岑為佛隴名呂山為東蒼又何妨指一山為天台指一寺為國清如最澄之歸日本若甯賁之適會稽耶嗟乎太虛寥廓真智靡涯職方於此索途燈公於此遺照敘固非我志亦非他華藏遮外而納安明於芥舟靈圉毀方而入玄真於珠口太史之圭奚測司空之度應捐權示桑欽括水泉於緗帙幻同伯禹攝山海於金經末裔由此衣傳傾都為之紙貴矣萬厯癸卯法華三昧道場期滿日菩薩戒弟子進士天官司勳大夫前職方郎武林虞湻熙和南書天台山方外志序天台山者上應三台星得名列於道書洞天福地為東南一大名勝按釋氏教宗則自智者大師以五時八教判釋東流一代聖教傳之四明尊者是為教觀禪宗則自雪居韶國師以祕密心印授永明壽禪師舉一心為宗照萬法如鏡是為宗門又五百應真行化此山方廣寺在有無縹緲間土人時聞鐘磬梵唄聲隱隱從地中出高僧曇公曾一至其處聖賢嫌其腸穢不得留出而洗腸於澗至今有曇華亭在石梁旁為應真舊蹟而彌陀一化現國清為豐干文殊普賢兩化現一為寒山拾得一為戒闍黎周七娘應變無方多所開化賢聖先後託迹稱三寶地按僊宗自周靈王太子晉僊去奉上帝命治桐柏宮實主此山其後劉晨阮肇採藥入桃源洞遇僊子度世唐司馬子微隱此山受度黃眉公證太乙生人之果至宋張紫陽真人大闡悟真之旨化度羣真終於佛氏滅度茶毘而收舍利玄風丕振又稱神僊地山形秀出華頂為最高處其山多名都洞府神峯秀嶺幽溪絕壑寶剎精藍琳宮道院嘉樹修竹靈藥瑤草在在有之以故王逸少許玄度輩結伴從剡溪入茲山采真焉孫興公作天台山賦鉅麗哉頗盡靈秀之觀矣邇者法師無盡燈公以上智夙德為百松玅峯師高足遠紹台宗卓錫佛隴愛此山秀拔神奇遂抽靈心發藻思作天台山志志佛蹟僊蹤名區勝壤亦既囊括臚列纖悉靡遺且氣格森嚴辭華宛畼掩文人之筆奪秇林之采而又發明宗教究極旨歸上繼佛隴之風下振百松之緒作人天之耳目為道俗之津梁旁及僊宗研討同異歸趨寶所羽翼台傳不知者以為名山之志知者謂是教觀之文自古山經地志多出文士之手彼其止習辭華罔究大道文藻雖盛玄風蔑如乃至淨衲高緇非不精通佛理或長於講演短於筆札惟師禪觀既深文心復鬯粲然鴻麗成一家言文章家取而藏之名山佛門中且取而庋之函部也嗟夫台宗自四明師示寂後幾乎泯泯狂禪之徒輒詆台教為煩瑣余謂科條似煩旨歸則要眾星拱辰百川會海如以台教為煩則華嚴八十一卷科條次第不更煩乎天幸百松振之幽溪復大振之而窮公闡發於句甬介公揚詡於虎林於是天台之宗煥然揭日月於重朗盛矣盛矣是志也紹先賢則光接慧炬開後學則智爍羣昏酬山靈則勒石懸崖傳文苑則永垂竹素是志之善物也世傳韶國師為智師後身以去來無礙之理論之安知韶公之後不復為盡老耶志成問序於余余夙稟教盡老得聞五時八教之旨夢寐名山託之神遊之日久烏得無言要以附志青雲而不朽匪特山神首肻亦或如來之所印可也旹萬歷乙巳仲春朔娑羅居士屠隆緯真甫篹於天中天室天台山方外志序史莫良于志天地人物禮樂刑名至奧渺夥賾矣然而圖諜度數存焉虛可稽也實可錄也苟擅三長甯欪四善哉志莫良于山紀載之難有數端焉猨栖熊館鳥道蛇盤蠟屐從所未經樵斧繇來罕到即有幽奇何緣覯覿雁宕徑辟于宋年黃海道登于明代非其驗與故真見難詳自昌黎慟哭于落雁之峰王陽迥馭于羊腸之阪文人墨客往往心快臥游具窮濟勝丹椒翠冪月磴天崖秪標異于登高眺遠之篇間問奇于牧竪蕘夫之口言之若夢槩乎有聞信耳既非任目逾舛山之真形從是遯矣故傳聞難據時易世移陵虛谷實嘑隨方改字以俗訛石翳蘚中疇睹神清之洞門潛水底詎窺小有之天或古有而今亡或此非而彼是文士疑而莫質野老㳂而不知辨而析焉良未易矣故攷証難精經丘尋壑別引勝流攬木援藟必資曠日而或輶軒之駕恨束馬之未能杖屨以遊虞贏糧之不繼非倥偬而靡暇綴錄即悵望而無力篹言徒遙想于冥搜曷散懷于奮藻故結撰難富兼而有之者其惟無盡大師之志天台乎師以法中龍象坐大道場以舌上珠璣作大佛事隘舊志之未廣懼靈蹟之無徵折竹晨編然松暝寫緝為山志數十萬言自山名以訖文章有涉茲山者罔不采其故實掇彼菁華至台教之真文高人之遺韻尤加詳焉頃以請藏金陵屬余為序余受而卒業嚮之所難今之所易可謂冥通地絡潛鏡山靈勒遐貫于清都垂宏模于法界者矣蓋其住山三紀振錫千峯徧尋不死之庭畢踐無人之境有勝必窮無險不陟與夫目薦未奇耳剽多妄者異矣而又蘿封之字普入搜羅樹挂之錢咸資考索且日探月厯神畫形摸以故琪樹金松同檢桐君之籙墨池茶圃雙甄管子之題鉅細不遺名實無爽又何有攷之未精撰焉未備者乎嗟乎覽應邵之記如禪岱宗披王履之圖若臨僊掌猶曰地以文奇境因語麗耳至若道元之注水經旁洽異書靈運之賦山居廣陳奇物千載而下等諷詠于登陟簡冊于丹青志而若斯斯已偉矣師之天台庶幾是乎若夫精詮教觀弘闡宗風霏法雨于松樞霔慈雲于蘿愰花飄座側樂鼓空中斯又地靈以人傑逾章山笥與海藏同久者也彼楊衒常記伽藍慧遠曾經廬阜厥稱著矣豈如斯志名寄區中理存方外將使絕粒茹芝之客默引瑤梯餐風味道之儔羣登寶筏者哉萬歷壬子仲秋日賜進士及第南京國子監司業前翰林院國史編修記注起居編纂章奏江甯友人顧起元撰天台山方外志序夫志猶史也亦傳也有天下之史一國之史一縣之史一家之史有僧史僊史高士之史名山之史史雖不同所以記言記事一也漢明以來佛教東漸三寶事蹟班班可紀故太史有左右之官僧錄亦設左右之職矧山林碩德著述猶多若梁慧皎法師唐道宣律師宋僧統贊甯之高僧傳宋道原禪師之傳燈錄駙馬李遵勗之廣燈錄惟白禪師之續燈錄四明盤公之佛祖統紀以至釋氏通鑑佛祖通載僧史畧釋氏稽古略之類曰教曰禪曰律人齊七眾門備十科矯矯人龍翼翼義虎有一言之悟人必書之有一行之合道必書之其啟迪後昆弘範時俗功德可勝言哉天台山者域內之名區東方之聖境也地靈人傑先靈於老釋後傑於儒宗僊風綿邈資始於軒商佛法秘藏肇基於方廣正言緇門著蹟則爰自東晉曇猷棲神蕭梁定光顯聖洎我陳隋智者大師立宗命教因山為家海內之宗事佛法者必以台教為司南降唐及宋元至我皇明師資相繼千有餘年無論天下教黌之盛即茲山流衍考諸僧史不減數百餘人與夫禪門則韶踵躅白沙皆法門之梁棟教鼎之鹽梅名言懿德膾灸人口豈不以此山泉石足以疏練神明產育聖賢而然耶然則山因人顯人以山名山已有志人胡可略舊為是志者謂釋老非志所急故存而不書或書而不詳然有世間法出世間法達人大觀無可不可若分門立戶不啻冰炭宜其目為天地間之尤物也今之所志亦謂世間法非出世之所急故存而不書非若冰炭之相視也為縣志已備故不復疣贅云志之為類者凡二十始於山之名終於山之文章蓋名者實之賓也微名無以顯實首以山名考緣名求實形勝雖山之實質源又山之起祖次以來源考形勝與山其猶影響山之形聲乃吾心之靈覺也次以山體考有形聲矣影響從之次以形勝考依形勝以建名剎次以山寺考石梁方廣赤城支提菩薩聖僧靈宅攸託次以聖僧考智者依山而進道後代繼祖以傳燈次以祖師考祖因山而得名法因山而立目次以台教考教得人以弘人得教以立次以高僧考桐柏桃源洞府在焉次以神僊考察嶺歡溪考槃是宮次以隱士考名山勝剎賴神功為之密護次以神明考三寶陰翊世道藉權貴為之顯持次以金湯考厯代奉法者咸有匱遺如陳宣帝之捐調隋煬帝之施品物雖歸化事尚傳聞為法門盛事次以盛典考石梁之現光現花佛隴之見橋見雀同乎見聞異乎常論次以靈異考古佛舍利奉安高顯諸祖靈骨瘞之方墳次以塔廟考智者降魔於華頂壽公入定于天柱至於一石一泉皆前人之遺蹟次以古蹟考人與山名欲同垂于不朽或刻石以記名或樹碑而頌德次以碑刻考菩提琪樹靈根託于名山羅漢恠松天葩生于勝地次以異產考上之王臣以及墨客或因人而著作或緣景以紬思皆有足以光彩名山憲章人物次以文章考發前人之所不發書前人之所未書述而不作以成一家之書名曰天台山方外志蓋取異于縣志之所略爾觀者請以此意恕之皇明萬厯歲在辛丑孟冬癸未之吉太末釋無盡傳燈命筆于天台之幽溪講堂天台山志目錄序韓將軍序始豐張序翰林院楊序王邑侯序虞司勳序屠儀部序翰林院顧序幽溪燈序第一卷山名考第一山源考第二山體考第三第二卷形勝考第四山五十三處第三卷峰三十三處巖二十九處嶺四十處洞八處石十處溪二十五處潭二十處湖八處塘三處井九處泉十處池三處第四卷山寺考第五寺六十二所院九所庵十四所蓮社一所道場二所堂二所觀五所宮五所道院十二所道庵三所第五卷聖僧考第六隱二處顯二十一人補遺七人第六卷祖師考第七一十七人第七卷台教考第八教觀大綱教門十八條觀門九條清規二條教觀書目共六十三人書三百部石室藏書儒部四十一種仙部十九種志部十一種第八卷高僧考第九教宗五十八人禪宗五十七人蓮宗十四人律宗人第九卷神仙考第十神仙三十六人道士三十七人第十卷隱士考第十一隱士五十人僑寓二十三人神明考第十二護伽藍神二人龍神十人土谷神祗十七人第十一卷金湯考第十三七十七人第十二卷盛典考第十四二十五事靈異考第十五釋三十四事道三十事第十三卷塔廟考第十六三十九處佛塔一十三處祖塔二十六處墳墓古蹟考第十七六十七處碑刻考第十八碑六十七處手書四種巖鐫十四人異產考第十九食十六種木五種杖三種花五種草四種獸十三種禽十四種藥七十九種石三種第十四卷文章考第二十敕十五首第十五卷書二十二首第十六卷書三十三首第十七卷書二十九首第十八卷疏十二首第十九卷序三十一首第二十卷記十六首第二十一卷記十六首第二十二卷記首第二十三卷碑六首第二十四卷塔銘五首行狀一首傳一首第二十五卷贊十三首第二十六卷賦四首第二十七卷詩賦景天台山四十二首第二十八卷國清寺二十八首赤城二十四首佛隴諸寺九首華頂十三首石梁橋三十三首萬年寺一十二首玉霄峰三首桐柏宮三十八首瓊臺二十三首第二十九卷桃源洞三十三首護國寺七首寒巖十六首明巖六首雜詩九首曹文晦八景八首第三十卷寄贈六十首佛隴曦跋刻板餘貲印訂三佰部流通
