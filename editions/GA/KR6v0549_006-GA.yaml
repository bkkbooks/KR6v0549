body:
  text: 祖師考第七夫天地英靈之氣結而為山融而為水山水之氣鍾於人物也亦盛矣哉豈惟養育材器誠能陶鑄聖賢而聖賢本有妙明靈覺之心雖不關於形氣亦或有以寓焉故心之至精必寓於形形之至靈必寓於氣氣者山水也詩云維嶽降神生甫及申斯之謂歟是以聖賢間生必靈區是託若迦文之居靈鷲孔氏之生泰山達磨之依嵩少思大之棲南嶽聖人非有意於卜居勝地必產乎賢哲故也然吾教本來於西域山源亦始於達池以道求山宛有符契蓋智者親承思大思大師宗北齊北齊遠稟龍樹龍樹祖於釋迦其猶台山父於南嶽祖於岷山曾於崑崙高於雪山此又不求合而自無不合者也嗚呼大師演教茲山稱為佛法司南豈小緣哉今考佛祖統紀上自龍樹下及法智共為台教祖師十有七世雖龍樹北齊南嶽不居此山寶雲法智弘教他郡然不有其父焉得其子不有其子焉顯其父故並列之以考夫源流也天台十七代祖師略傳初祖西天龍樹尊者龍樹尊者南天竺國梵志之裔始生之日在於樹下由入龍宮始得成道故號龍樹佛去世後七百年出天姿聰悟在乳哺中聞諸梵志誦四韋䭾典有四萬偈偈各三十二字皆達句義弱冠馳名獨步諸國天文地理星緯圖讖及餘道術無不綜練後因術罹禍悟慾為苦本誓願捨俗遇十二祖迦毘摩羅尊者機緣相契即求出家於九十日誦通三藏閻浮所有經書皆悉通達辨才無礙自謂一切智人心自念言世界佛經雖妙句義未盡我當更敷演之開悟後學大龍菩薩愍其心念即以神力接入大海宮殿開七寶函與諸方等經典九十日中通解甚多龍曰汝今閱經為徧未耶師曰汝經無量不可得盡我今所讀足過閻浮十倍龍曰忉利天上諸經復過此中百千萬倍師於龍宮修行豁然通達善解一相深入無生龍知悟道送師出宮智者云樹生生身龍生法身故名龍樹是後大弘佛法所造有大悲方優論五千偈明天文地理作寶作藥大莊嚴論五千偈明修一切功德法門大無畏論十萬偈明第一義中觀論者是其一品即大智度論是也優波提舍論十萬偈忽一日入月輪三昧唯聞法音不見形相唯弟子提婆識之曰師示佛法非聲色也龍樹乃付法提婆復入閒室經日不出弟子破戶視之見三昧蟬蛻而去天竺諸國並為立廟敬事如佛出付法藏經摩訶羅經又楞伽經云善逝涅槃後未來世當有南天竺比丘厥號為龍樹能破有無宗顯我大乘法得初歡喜地往生安養國為佛懸記若此其功德尚可思議乎見本傳二祖北齊尊者師諱慧文姓高氏當北朝魏齊之際夙稟圓乘天真獨悟因閱龍樹菩薩大智度論第十三卷悟三智一心中得又因讀中論大智度論中觀一品至四諦品偈云因緣所生法我說即是空亦名為假名亦名中道義恍然大悟頓了諸法無非因緣所生而此因緣有不定有空不定空空有不二名為中道既一依釋論是知遠承龍樹也師在齊高之世聚徒千百專業大乘獨步淮河時無競化所入法門非世可知學者仰之以為履地戴天莫知高厚師以心觀口授南岳盛弘南方而師之門人在北者皆無聞焉見佛祖統紀三祖南嶽尊者師諱慧思姓李氏元魏南豫州武津人也兒童時夢梵僧勉令入道嘗於空塚及移託古城鑿穴棲身除乞食緣晝夜讀法華經頂禮精勤不事寢息久雨濕蒸舉身浮腫忍心向經忽爾消磨又夢普賢乘白象王摩頂所摩頂上隱起肉髻年十五出家受具夢四十二僧為加羯磨圓滿戒法因讀妙勝定經見讚美禪定乃徧親禪學後謁文師咨受口訣授以觀心之法坐禪達旦遂動八觸因見三生行道之迹夏竟將受歲放身倚壁豁然大悟法華三昧師此後弘通大乘初河南衮州次郢州次光州開岳寺次大蘇山每講大般若經時為諸惡論師競以毒藥欲斷師命師一心念般若毒即為消由此發願造金字大品般若經及法華經造畢製願文一卷在藏命弟子智顗代講至一心具萬行忽有所疑師曰如汝疑者乃大品次第意耳未是法華圓頓旨也吾昔於夏中一念頓證諸法現前吾既身證不必有疑顗師問所證是十地耶曰吾一生望入銅輪圓十住以領徒太早損己益他但居鐵輪耳十信後避地居南嶽登祝融峯遇嶽神會棋神詣師曰師何來此師曰求檀越一坐具地神曰諾即飛錫以定其處今福嚴寺是神曰師已占福地弟子當何所居師即轉一石鼓下逢平地而止今嶽君塑像猶在石鼓之上嶽神乞戒師為說法要一日謂嶽神曰他日吾有難檀越亦當有難事具本傳師將順世大集門學連日說法苦切寒心乃曰若有十人不惜身命常修法華念佛三昧方等懺悔常坐苦行者隨有所須吾自供給如無此人吾當遠去竟無荅者即屏眾斂念將入寂弟子靈辨不覺號哭師訶之曰惡魔出去眾聖相迎方論受生處何驚吾耶即端坐唱佛來迎合掌而逝顏色如生異香滿室陳太建九年六月二十二日壽六十三夏四十九師身相挺特耳有重輪頂有肉髻牛行象步不倚不斜平昔禦寒惟一艾衲繒纊之屬一切不受所居之處靈瑞重沓供物嚴備瓶水自滿有諸天童以為侍衛或現形大小或寂爾藏身異香勝迹不可勝紀常示眾曰道源不遠性海非遙但向己求莫從他覓覓即不得得亦非真又偈曰頓悟心源開寶藏隱顯靈通見真相獨行獨坐常巍巍百億化身無數量縱令逼塞滿虛空看時不見微塵相可咲物兮無比况口吐明珠光晃晃尋常見說不思議一語標名言下當有偈曰天不能蓋地不能載無去無來無障礙無長無短無青黃不在中間及內外超羣出眾太虛玄指物傳心人不會寶誌公嘗寄聲與師曰老和尚終日灰頭土面何不向紅塵中度眾生去師荅曰三世諸佛為我一口吞盡有何眾生可度故禪人有南岳峯頭思大口紅塵堆裏誌公心之句至今傳為口實佛祖統紀四祖智者大師大師諱智顗字德安姓陳氏穎川人也隨晉遷都因止荊州之華容縣父為梁湘東王賓客孝元帝即位拜使持節散騎常侍益陽縣開國侯母徐氏溫良齋戒孕師時每獲奇夢初生之時神光煥然兼輝鄰屋凡諸俗慶並火滅湯冷為事不成師堯眉舜目湯肩禹背具四王之相年十五於長沙像前發弘誓願作沙門荷負正法由精誠感通夢佛三為摩頂由是益勵其志但二親恩愛不時聽許乃懇切禮誦冀獲解脫當拜佛時恍焉如夢見極高山臨於大海山頂有僧招手喚上以臂接引登山見所造像在彼殿內伸臂僧舉手指像而語之曰汝當居此汝當終此後丁二親艱始得遂願年十八投沙門法緒出家從慧曠師學律後詣大蘇山持法華經宿緣所熏常好禪悅慧思禪師名高嵩嶺行深伊洛十年常誦七載方等九旬常坐一時圓證乃輕生重法涉險而去初獲頂禮思曰昔日靈山同聽法華宿緣所追今復來矣即示普賢道場行法華三昧經二七日行道誦經至藥王品諸佛同讚藥王菩薩言是真精進真法供養豁然大悟照了法華將證白師師曰非爾弗證非我不識所發定者法華三昧前方便也所發持者初旋陀羅尼也縱令文字法師千羣萬眾莫窮汝辨於說法人中最為第一因代講般若思師手執如意於眾中曰可謂法付法臣法王無事者也又謂之曰吾久羨南嶽恨法無所寄汝可傳燈設化莫作最後斷佛種人汝於陳國有緣宜往利益既奉嚴訓乃共法喜等二十七人同至陳都儀同沈君理請住瓦官寺開法華經題勑一日停朝事公卿畢集停瓦官八年講大智度論說次第禪門蒙語默之益者略難稱紀後徒眾多而得法少乃曰妨我自行化道可知羣賢各隨所安吾欲從吾志也吾聞天台地記稱有僊宮若息心茲嶺展平生之志陳主有勑連徐僕射澘涕勸請匪從物議直往東川陳太建七年秋九月也初入天台厯遊山水度石梁遇聖僧雖蒙懸授國清之讖於時三方鼎峙悠悠何日且隨途南出見佛隴南峯左右映帶最為兼美即徘徊意其夕乃宿定光禪師草菴定光謂曰還憶夢中招手事乎此峯金地我已居之北峯銀地汝當居之即今修禪道場是也大師雖𣸪懷寶窮岫聲振都邑陳少主顧問郡臣曰釋門誰為名勝徐陵對曰瓦官禪師德邁風霜禪鑑淵海昔遠遊京邑郡賢所宗今高步天台法雲東靄永陽王北面親承願陛下詔之還都弘法陳主凡三遣使皆自手書勑詔悉稱疾不當後更勑州敦請為永陽王切諫乃赴立禪眾於靈曜開釋論於太極又講仁王般若百座居左五等居右陳主親筵聽法於廣德殿謝曰非但佛法仰委亦願示諸不迨後國敗入隋秦孝王聞風延屈晉王北面親承師曰大王紆遵聖教名曰總持王曰大師傳佛法燈稱為智者至隋開皇十三年旋鄉說法以荅地恩十五年自荊下業十六年重入天台十七年晉王敦請出至石城謂徒眾曰大王欲使吾來吾不負言而來吾知命在此故不前進於石像前口授遺書云蓮華香爐犀節如意別大王願芳香不窮常保如意索三衣命掃洒令唱法華觀無量壽佛二部經名說十如四不生等法門一一法門攝一切法吾今最後策觀談玄最後善寂吾今當入智朗請曰不審師居何位沒此何生誰可宗仰報曰我不領眾必淨六根損己利他但居五品生何處者吾諸師友並從觀音皆來迎我誰可宗仰者汝不聞三聚淨戒是汝大師四種三昧是汝明導種種開示教勑竟跏趺唱三寶名而入三昧以開皇十七年十一月二十四日未時入滅春秋六十僧夏四十錢忠懿王申請於朝追諡法空寶覺尊者宋寍宗慶元三年以荊門請加諡靈慧大禪師具天台別傳五祖章安尊者師姓吳氏臨海章安人始生三月能隨母稱三寶名有僧過門謂其母曰此子非凡因以灌頂為名七歲入攝靜寺依慧拯出家日記萬言年二十受具戒天縱慧解一聞不忘陳至德初謁智者於修禪寺稟受觀法研繹既久頓蒙印可因為侍者隨所住處所說法門悉能領解禎明元年隨智者止金陵光宅聽講法華隋開皇十三年夏受法華玄義於江陵玉泉十四年夏受圓頓止觀於玉泉至於餘處講說聽受之次悉與結集大小部帙百有餘卷傳諸未聞師之功也師著涅槃玄義二卷疏二十卷時隋末兵興寇盜羣起師自序云推度聖文凡厯五載何年不見兵火何不見干戈菜食水齋冰牀雪被其勞苦有若此者疏成烈火焚之不爇師晚年於會稽稱心精舍講說法華時人讚之有跨朗籠基超雲邁印之語唐貞觀六年八月七日終於國清寺壽七十二臘五十二先是貞觀元年同學智晞臨終曰吾生兜率見先師智者寶座行列皆悉有人唯一座空彼天人曰卻後六年頂法師來昇此座計歲論期審晞不謬吳越王請諡為總持尊者見佛祖統紀六祖法華尊者師諱智威蔣氏栝之縉雲人家世業儒年十八為本郡堂長郡學之職父母令歸納婦路逢梵僧謂之曰少年何意欲違昔重誓耶因示其五願曰一願臨終正念二願不墮三途三願人中託生四願童真出家五願不為流俗之僧蓋前身為徐陵聽智者講經深有詣入對智者親立此願師聞願已不復還家即往國清投章安為師受具之後咨受心要定慧俱發即證法華三昧唐上元元年欲卜勝地說法度人執錫而誓曰錫止之處即吾住所其錫自國清飛至蒼嶺普通山可五百里以隘陜不容廣眾陵空再擲至軒轅鍊丹山師既戾止剪棘刈茅班荊為座聚石為徒晝講夜禪手寫藏典於是名其地曰法華既而學者子來習禪者三百人聽講者七百眾常分為九處安居師身長七尺骨法古秀每登座有紫雲覆頂狀如寶蓋鳥雀旁止有同家畜法華至僊居上阪約八十里師每日往返齋粥禪講未嘗少違咸謂有神足通永隆元年十一月二十八日趺坐禪堂而化異香七日不歇是日眾見坐逝於寺而上阪之人見越檀越舍至人起滅其不可測識如此傳法雖眾唯天宮威師為之正嗣師在太宗朝名德升聞召補朝散大夫封引駕大師吳越王請諡玄達尊者見佛祖統紀七祖天宮尊者師諱慧威姓劉氏婺州東陽人摠角之深厭勞生遂入空門祝髮受具聞法華大弘天台之道即往受業刻志禪法晝夜惟勤三觀法門頓獲開悟時人見其深入威師之室遂以小威師稱之後歸止東陽山谷師年四十絕交人事自法華入滅之後登門求道者不知其數傳法之的唯在左溪耳師於高宗朝與法華同封朝散大夫四大師吳越王請諡全真尊者見佛祖統紀八祖左溪尊者師玄朗字慧明婺之東陽人姓傅氏雙林大士六世孫也母葛氏感異夢而有娠洎生未嘗作嬰兒啼每見人則欣㗛盈面九歲出家受具後聞天宮盛弘止觀即往求學未幾一家宗趣解悟無遺常以十八種物行頭陀行依憑巖穴建立招提面列翠峯左縈碧㵎因自號曰左溪每言泉石可以洗昏蒙雲松可以遺身世常晏居一室自以為法界之寬心不離定口不甞藥耄耆之同於壯齡揉紙而衣掬泉而飲洗鉢則羣猿爭捧誦經則眾禽交翔幽棲林谷深以為樂一日有盲狗至山長嘷伏地師為行懺不逾旬日雙目俱明每翹跪祈請願生兜率內院斂念之頃忽感舍利從空而下天寶十三載九月十九日呼門人謂曰吾六即道圓萬行無碍戒為心本汝等師之即端坐長別壽八十二夏三十一吳越王請諡明覺尊者具見佛祖統紀九祖荊溪尊者師諱湛然姓戚氏世居晉陵荊溪時人尊其道因以為號家本習儒故幼學夙成在兒童中超然有邁俗志年十七訪浙右開元十八年始從學左溪左溪既沒師挈密藏獨運東南謂門弟子曰道之難行也我知之矣古之至人靜以觀其復動以應其物二俱不住乃蹈大方今之人或蕩於空或膠於有自病病他道用不振將欲取正舍余誰歸於是大啟妙法旁羅萬行盡攝諸相入於無閒即文字以達觀導語默以還源乃祖述所傳著為記文凡數十萬言使一家圓頓之教悉歸於正曰金錍曰義例皆孟子尊孔道闢楊墨之辭識者謂荊溪不生則圓義永沉矣天寶大厯閒朝廷三詔並辭疾不起始居蘭陵嘗與江淮名僧四十人同禮五臺清涼觀師帥徒千指迎送時人歎其尊師之有禮有不空三藏門人含光白師曰頃從不空遊厯天竺見梵僧云聞大唐有天台教迹可以識偏圓𥳑邪正明止觀可能譯之至此土耶師聞之歎曰可謂中國失法求之四維晚歸台嶺大布而衣一牀而居以身誨人耆年不倦大兵大飢之際學徒愈繁瞻望堂室以為依怙建中二年二月五日示疾於佛隴語門人曰道無方性無體生歟死歟其旨一貫吾歸骨此山報盡今夕要與汝等談道而決夫一念無相謂之空無法不備謂之假不一不異謂之中在凡為三因在聖為三德爇炷則初後同相涉海則淺深異流自利利人如此而已汝其志之言乞隱几而化壽七十二夏四十門人受業身通者三十九人縉紳先生高位崇名而屈體承教者又數十人吳越王請諡圓通尊者具佛祖統紀十祖興道尊者師諱道邃不知何許人唐大厯中來依荊溪於佛隴洞悟幽玄無所疑滯荊溪嘉之曰吾子其能嗣興吾道矣遂授以止觀輔行師為眾開說發明深旨聽者無不領悟同門元皓一見師大敬服貞元二十一年日本國最澄遠來求法聽講受誨晝夜不息盡寫一宗論疏以歸既泛舸東還指一山為天台創一剎為傳教化風盛播學者日蕃遂遙尊邃師為始祖日本傳教實起於此盤公私諡興道尊者見統紀十一祖至行尊者師諱廣修姓畱氏東陽夏昆人早入邃師之室研精教觀而向心至行日誦法華淨名光明梵網四分戒本為常課六時行懺晚年彌篤每嵗行隨自意三昧七七日未嘗以事廢天台刺史韋珩素重教門請入郡堂講止觀珩於即席深有省發時會聽者莫不欣慶會昌三年二月十六日終於禪林登門弟子甚眾居上首名物外盤公私諡至行尊者見統紀十二祖正定尊者師諱物外姓楊氏閩之侯官人從修師傳止觀且說且行大中末斂跏趺一室妙入正定謂弟子曰汝若不死至五穀登時可擊磬引我出越餘弟子如所教遂從定起中和五年三月十五日終於國清門人元誘敬林慧疑皆傳道於世以紹家學盤公私諡曰正定尊者具見統紀十三祖妙說尊者師諱元琇天台人依國清外法師學止觀盡其旨妙於講說不以學徒眾寡二其心一日昇座眾集有異僧十人自外而入威儀一觀致敬已坐行末講散復問訊即出師遣侍者邀之皆陵空舉手笑謝而去師當僖昭之際天下方亂學教之徒忽散忽聚以故得定慧之業者艱其人唯清竦常操承事日久洞達無遺盤公私諡為妙說尊者見統紀十四祖高論尊者師諱清竦天台人依琇法師精思止觀旦夜不懈及繼主國清說行兼至時錢氏建國吳越天台一境有同內地師領眾安處勵其志曰王臣外護得免兵革之憂終日居安可不進道以答國恩每臨座高論不已眾莫敢有倦色門人世業者羲寂志因覺滿盤公私諡為高論尊者具見統紀十五祖淨光尊者師諱羲寂字常照永嘉胡氏子幼白二親求出家誦法華期月而徹年十九祝髮具戒深達持犯乃造天台學止觀於竦法師其所領解猶河南之一徧照也嘗寓四明育王寺夢登國清上方有寶幢座題曰文殊臺欄楯外隔欲入不可俄見觀音從堂而出手卻行馬低囘相接忽見自身與觀音體合為一自是之後樂說無盡吳越忠懿王因覽永嘉集有同除四住此處為齊若伏無明三藏則劣之語以問韶國師韶曰此是教義可問天台寂師王即召師出金門建講以問前義師曰此出智者妙玄自唐末喪亂教籍散毀故此諸文多在海外於是王遣十使往日本國求取教典既囘王為建寺螺溪扁曰定慧賜號淨光法師及請諡天台諸祖一家教學鬱而復興師之力也雍熙四年十一月四日寢疾囑門人不許哭泣祭奠言已即瞑目壽六十九夏五十傳法弟子百餘外國十人義通實為高弟天台官民先會傳戒者共迎師真相於開元寺縞素致祭哀動一城天為慘色盤公私諡淨光尊者見統紀十六祖寶雲尊者師諱義通字惟遠高麗國族姓尹氏梵相異常頂有肉髻眉毫宛轉伸長五六寸幼從龜山院釋宗為師受具之後學華嚴起信為國宗仰晉天福時來遊中國至天台雲居韶國師輪下忽有契悟及謁螺溪聞一心三觀之旨乃歎曰圓頓之學畢茲轍矣遂留受業久之具體之聲浹聞四遠欲括囊東歸假道四明郡守太師錢惟治咨問心要請受菩薩戒乃固留之曰或尼之或使之非弟子之力也如曰利生何必雞林乎高麗別名師曰緣既汝合辭不我卻因止其行漕使顧承徽舍宅為傳教院太平興國六年賜額為寶雲師敷揚教觀幾二十年昇堂受業者不可勝紀惟法智慈雲為上足常呼人為鄉人有問其故曰吾以淨土為故鄉諸人皆當往生皆吾鄉之人也端拱元年十月二十一日右脇而化闍維三日舍利盈滿骨中門人奉葬於育王寺之西北隅壽六十二具統紀十七祖法智尊者師諱知禮字約言四明金氏父經與母李氏禱於佛夢神僧携童子遺之曰此佛子羅𬑟羅也暨生因以為名七喪母號哭不絕白父求出家太平興國四年從寶雲學教觀始三日首座謂之曰法界次第汝當奉持師曰何謂法界座曰大總持法門圓融無礙者是也師曰既圓融無礙何有次第座無對居一月自講心經聽者服其夙悟五年其父夢師跪于寶雲之前以瓶水注於口自是圓頓之旨一受即了端拱元年寶雲歸寂師復夢貫寶雲之首擐於左臂而行即自解曰將非初表受習流通次表操持種智之首化行於世耶淳化閒始受請主乾符因學徒繁集遂徙居保恩院道法大熾為學徒淵藪日本嘗遣徒持二十問詢求法要師答之咸臻其妙天台之教莫盛此時真宗皇帝知名遣中貴人至其居命修懺法厚有賜予嘗偕十僧修妙懺三年且約以懺罷共焚其軀庶以激怠惰而起精進翰林學士楊億駙馬都尉李遵勗嘗薦師號遐仰道風白丞相寇準奏紫服及法智大師號復奉書為賀兼勸請住世師以公私意勤竟沮前志門人本如上堂請益經王之旨師曰汝為我作三年監院來如依言三年辦事竟特上堂諮問師乃大喝一聲如豁然開悟乃呈頌曰處處途歸路時時復故鄉本來成現事何必待思量其開悟人隨機施設有若此者復集十僧修大悲懺三年又修光明懺七日為順寂之期方五日結跏趺坐而逝實天聖六年正月五日也年六十有九僧臘五十四經月發龕以視顏膚如生瓜髮俱長茶毘舌根不壞舍利不可數門人稟法領徒者三十人入室四百八十人升堂千人所著述至多師以上智之才當中巽之運東征西伐再清教海功業之盛可得而思自荊溪而來九世二百年閒備眾體而集大成闢異端而隆正統惟師一人而已嗚呼盛哉統紀昭宣法師用荷法師獻玭法師文舟法師從鏡法師機融法師華蓮法師錦超法師妙宣法師鈵輝法師朗修法師從漢法師西璋法師景持法師德山法師聞昌法師卓雲法師同透法師指南法師顯清法師華山法師功極法師永修法師趨西法師文雲法師已上各助英洋壹元光緒拾九年桂月天台山佛隴真覺寺敏曦募刻
