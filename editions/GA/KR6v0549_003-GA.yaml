body:
  text: 天台山幽溪沙門傳燈撰峯華頂峯在縣東北六十里十一都天台第八重最高處舊傳高一萬八千丈周回一百里少晴多晦夏有積雪可觀日之出入中有洞石色光明登絕頂降魔塔東望滄海瀰漫無際號望海尖下瞰眾山如龍虎盤踞旗鼓布列之狀草木薰郁殆非人世智者與白雲先生思修於此有葛玄丹井王羲之墨池李太白書堂台山九峯崒嵂猶如蓮華此為華心之頂故名摘星峯在華頂之東頗極高峻東蒼峯即蒼山也獅子峯即繫船山大雷峯縣北大慈寺主山東有蜜蜂洞葛閬峯在縣東北三十里寒風闕之上長壽寺照山上有龍潭亦多效靈香爐峯在縣東北五十里十一都以日出有紫烟故名香柏峯在縣北六十里十一都以多柏木故名四望陰崖垂磴萬仞菩提峯在縣北八十里大同寺後所謂菩提大同是也玉霄峯在縣北三十五里即洞天宮重崖疊嶂松竹葱蒨且產香茅直南巽隅兩石對峙如門扉號小桐柏玉笥峯在銀山頂號金箱玉印五峯在國清寺側正北曰八桂東北曰靈禽東南曰祥雲西南曰靈芝西北曰暎霞前有雙澗合流南注大溪舊志云號天下四絕之一天台大師云吾刱寺雖多惟徐州靈巖潤州棲霞荊州玉泉并國清為四絕水塏西峯縣北二十里僧普岸所棲紫凝峯縣西三十五里智者誦經感紫雲護故名九拆峯在縣東北三十里十都智者宴坐處孫綽所謂既克濟於九拆路威夷而修通是也蓮華峯在縣西北三十五里十三都以狀如蓮華故名通玄峯在縣北五十里十一都僧德韶嘗卓菴於此列秀峯在縣西北六十五里萬年寺西蘆峯在縣西九十里三十七都淨慧寺前舊傳葛玄植蘆於此下有蘆洋蘆坑浙峯在縣西五十里三十二都一作岊崷又有匼崷在縣東四十里胡崷在縣西北四十五里俱見范志菡溪峯在縣西五十里三十一都又名翠巖四面懸絕峯頂坦平桃竹繁華秀麗華琳峯在縣西北一十八里十二都香琳峯在縣西北三十里十二都玉泉峯在縣西北二十里桐柏觀前瑞雲峯亦在觀前紫霄峯在福星觀前臥龍峯在縣西北二十五里桐柏山之側蒸餅峯在石梁北出根子昔僧曇猷欲渡梁訪方廣寺有石如屏梗之號蒸餅白雲峯在縣東北二十五里十一都太平興國寺側大隱峯未詳處所宋錢厚之建雙清堂於其下王銍為記瓐峯在縣南十里二十都玉女峯在縣二都巖白郎巖在縣西北三十里十四都齊僧普耀自遼東憇此有神號江白郎告曰此吾所居以師有德業推以相奉故建寺號白巖唐長慶四年令白餘豐首禱雨焉時有異物似龍自穴而出至寶厯初再禱亦然前進士王展為之記百丈巖在縣西北二十五里崇道觀西北與瓊臺相望峭險束隘四山牆立下為龍湫翠蔓蒙絡水流聲潀然磐㵎繞路入為靈溪由高視下凄神寒骨北望石口呀然如張頤亦號獅子巖有石牀可盤踞獅子巖在繫船山北口呀然如獅子故名下臨小溪險峻不可陟特可仰視有石棺石櫃石爐之屬舊傳天台本東海島嶼理或有之巖下有竅日初出時光入隙中謂之日窗東望小亭即龍王祠也翠屏巖在縣南二十五里二十一都八峯山上下有龍湫志要云山形壁立如屏風然故名遠望山勢中立如案兩端略起似展誥軸又名展誥屏後有特山如展誥者曹家巖在縣西三里二十都有靈康行祠今廢傍有小湫舊名五龍潭龜巖在縣南五里闡法寺側三巖相連其上如一元至元中忽一日雷雨有聲轟然旦視之其巖左脇橫裂濶十數丈深不可測寶陀巖在縣北二十里十一都捨身巖在縣北五十里石橋之側赤巖在縣南一十里二十都峭壁屹立如大屏其色丹赭號小赤城佛巖在縣西三十里二十三都舊傳野燎至此自滅見有泗洲小像遂立祠號曰佛巖隱身巖在縣西北二十五里桐柏觀之西隱巖在縣北三十里一都神跡石之東夏赤城有始得隱巖記麻姑巖在縣東南二十五里一名仙姑靈巖在縣西五十里三十二都巖洞虛逈有石如案與浙崷山相連中有小㠘號曰文㠘左右魚石盤列暎帶響巖在縣東七里大小石鎖巖在縣西北一十五里福星觀西盤接峭峻舊傳其地積陰夜聞呻吟聲云是冥司拷掠之所按唐裘甫作亂王師會戰於此豈死者之精魄未散而然耶鑿字巖在縣北三里十一都巖上有萬松徑三字各廣八尺僧指堂書刻由巖至國清兩行昔列大松今無鷹嘴巖在縣西南三十五里二十三都拾得巖在國清寺烏石巖在縣北五里十二都赤城之南又名烏岡靈響巖在高明寺幽溪之上峭壁百仞隨人呼喚響荅甚分明香谷巖在幽溪之上石如列屏前有隙地方丈許周植眾木前種修竹數百竿每遇陽和則聚徒於此𥪡義多生蘭蕙故名觀音巖在螺溪之側天冠瓔珞於蒼翠中宛然一普陀大士也巾子巖在幽溪之背白雲峯南有石正方如巾上拂霄漢下連磐石纔數尺許流雲乍過其上恍然天柱欲頹石筍巖在螺螄潭上根入潭水數十丈尖銳如筍多生莓苔及生卷柏蒙葺披離又如紫籜之將解合掌巖在明巖寺絹機巖在丹丘山西犀牛翫月巖在丹丘山南嶺顧儒嶺在縣東一十五里十都舊名東𡵙有顧歡讀書堂故址八桂嶺在縣北五十里十一都孫綽所謂八桂森挺以凌霜察嶺在縣北五十里與金地嶺接蓋漢高察所隱有讀書堂址金地嶺在縣北二十里十一都在招手巖下銀地嶺在縣北二十里十一都即定光佛示智者處杜潭嶺在縣南二十五里與臨海分界黃振嶺在縣東四十里與臨海分界關嶺在縣西四十五里十五都與新昌分界上有朱葉二侯王廟有司新任道經此者必祀之宋令鄭至道去任邑人至此攀戀不忍捨因留家焉今其苗裔猶有存者居側有鄭公祠肖像其中前有松關留鄭坊筋竹嶺在縣東四十六里五都與海分界又二十七都亦有伏虎嶺在縣西一十五里白水嶺在縣西二十里十三都黃壇嶺在縣南二十五里二十一都斜嶺在縣西四十里二十七都石壁嶺在縣西四十五里二十七都羅公嶺在縣北五十五里十一都盤來嶺在縣西北五十里十五都鎗旗嶺在縣西七十里三十五都梅枝嶺在縣東八十里摘星嶺在縣北一百里山隍嶺在縣東三十里三都興化嶺在縣東四十五里一都黃山嶺在縣南十里八都其麓有鋪喬嶺在縣西七十里三十六都王顧嶺在縣西九十里三十七都金筻嶺在縣西四十里二十七都烏巖嶺在縣西六十里二十八都王會嶺在縣西北五十里二十七都牛石嶺在縣西北七十里十五都羅漢嶺在縣西北六十里萬年寺東南赤城三志云嶺有巨杉偃蹇絜之大百圍凡供五百大士必於此嶺邀請桐柏嶺在縣西一十五里十二都洞天嶺在縣西北三十里十二都魏嶺在縣東北三十里天封之外舊產茶招隱嶺在縣東北五十里十一都昔顧歡招同郡人杜京產隱此菴頭嶺在縣西南十五里二十三都孟湖嶺在縣西六十里三十二都蒲棚嶺在縣西南七十里三十二都牛路嶺在縣西五十五里二十七都幽溪嶺在高明寺傍猢猻檑嶺在慈聖寺東大同寺西險峻難可登陟故名大嶺小嶺在秀溪上俗諺云十里橫沿九里阬大嶺小嶺在中央洞玉京洞在赤城右脇蓋十洞天之第六茅司命真君所治或號太上玉清天或號玉真清平天或號上清玉平天按道書云天尊在元都玉京山說法令眾仙居此又會稽記云赤城山有玉室璿臺許邁嘗居此因與王羲之書云自天台山至臨海多有金臺玉室仙人芝草赤城事實又載晉柏碩因馳獵深入見其中有名花異草香氣不凡又徐靈府小錄云其下別有洞臺方二百里魏夫人所治南馳縉雲北接四明東距溟渤西通剡川中有日月三辰瑤花芝草自晉宋梁隋暨唐天寶嘗以日中星鳥望秩茲山今洞口有石刻玉京二大字旁無年月可考宋咸平天聖中屢投金龍玉𥳑今湮塞側有道人洞其中三石穴險不可入劉阮洞又名桃源洞在縣西北二十里十四都護國寺東北先是漢永平中有劉晨阮肇入山採藥失道見桃實食之覺身輕行數里至溪滸有二女方笄咲迎以歸留半載謝去至家子孫已七世矣宋景祐中僧明照亦因採藥見金橋跨水有二女戲水上恍然如故事焉乃疏鑿為亭植桃紛擁元祐二年邑令鄭至道始鑿山開道夾岸植桃數百本仍即景物之勝而命名之隨山曲折水窮道盡則有洞潛通山底深不可測其林木瑰異殆不類人間乃即山石為址結亭其上榜曰浮杯鄭侯為記丹霞小洞在縣西北一十五里福星觀東北舊傳葛玄煉丹於此有仙人拍手巖唐刺史柳泌於此修藥有宅故址在其上蓋竹洞在縣北六十里石橋之側宋憲使何偁嘗夢遊其地訪之不得嘉泰元年邑令丁大榮因禱雨得之洞深三丈餘中有二硤穹窿幽邃下視攢峯壘嶂如列翠屏圓通洞在幽溪之上一石橫架廣丈許修二丈許似人負安者下則四石砥盛玲瓏空洞四牕開豁松風溪流隱隱送聲來於坐中可習耳根圓通故名潛真洞在寒巖米芾書題龍鬚洞在寒山棲真洞在明巖石坐禪石在縣西北八十五里慈聖寺東舊傳有壽禪師宴坐於此般若臺石在幽溪之傍長松作蓋溪水紆迴潭影空人心於斯坐證矣雞籠石在縣東八里九都以其狀名拋陀石在縣西一十五里十三都俗傳仙人自擔石擲此磐陀石在縣東北五十里天封山擔石在縣東十三里六都其石長十丈倚巖如擔下有二巨石在水濱故名神蹟石在縣北二十里九都石上有大人跡鄉人立廟仙人棺在寒山聖蹟石在大雷峯後三石品安下二石如僧雙履一石如僧包袱橫壓其上俗稱仙人鞋五百羅漢石在五百相傳五百羅漢自西天泛海至此舡與眾物皆化為石故有覆舡山蓮華鉢錫之類厯然可指山名五百蓋其遺意隔溪小山有三石洞如龕室皆可跏趺溪南奧溪在縣西北七里源出寒風闕過國清入於大溪螺溪源出黃壇楢溪在縣東二十五里孫綽所謂濟楢溪而直進是也杜甫詩云饑拾楢溪橡徐靈府記注云出華頂從鳳凰山東南流入溪則得名舊矣又以齊顧歡嘗居其上名歡溪志要云流往十都至六都與五柏靈溪諸水合流而西經大覺寺前大溪以入海水母溪在縣北一百里摘星嶺南源自華頂入海界羅木溪在縣北六十里羅公嶺南源出華頂流入剡福溪在縣北四十里晉束皙啟蒙記云天台山去人不遠路經福溪水淺而清蓋是時已有此名矣其流西入於剡鬧溪源出察嶺秀溪源出萬年寺前縣前大溪在縣南五十步源出東陽縣界以其受始豐清溪桐柏國清眾流勢甚險怒流塞無定處大抵皆發源澗谷易盈易涸順流而下凡一百一十七里至府力勝四十斛舟然水落則不可行矣其餘小溪俱不通舟楫志要云源出大盆山合寒明雨巖鷓鴣諸山溪壑桃源瀑布及始豐湖眾流繞縈縣境演漾清冽環抱如帶出東橫山趾逶迤而東至鳳凰山側又會寶華之源五百靈溪歡溪等水於大覺寺山麓折流而南至臨海界入三江以達於海自築城後名曰學前大溪始豐溪在縣西百步源出大磐山東一百八十里與清溪合始入大溪國清溪在縣北一十里發源自佛隴山南流至神蹟石會於大溪神蹟石溪在縣東北三里俗名白鶴溪接國清之水至廟側分支一入臨川橋一入孝義橋俱會於大溪赭溪在臨川橋北俗名後堂溪自神蹟石流經臨川橋以達大溪每暴雨奔濤如怒勢不可禦以其溪皆赭石故名舊有從化橋今廢夏赤城見霞亭實臨其側清溪在縣西五里源出天台山南流至桐柏又南流三里經三井下流為瀑布方南入大溪志要云流出十五都山口與左溪秀溪反桃源之水流入曹家巖南入大溪其水澄清故名舊稱青溪無謂靈溪在縣西北十五里福聖觀前今縣東三十里亦有靈溪蓋其名適類云乾溪在縣東一十五里其源出石井山舊傳僧曇猷飛錫救