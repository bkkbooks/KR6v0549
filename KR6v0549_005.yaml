body:
  text: 聖僧考第六夫聖之為言正也所以正己正人也正己克去己私正人復還天理正己自覺正人覺他正之為言雖同正之所以實異故有世間聖人焉出世間聖人焉言出世間者非謂離此世間別有出世間祗即此世間所見與世人異耳譬如恆河一也而諸天見為琉璃遊魚見為窟宅餓鬼見為猛火凡人見為清水豈不以物隨業轉境逐心生而異耶故佛說世間隨見有四種國土不同世人所見瓦礫荊𣗥等謂之凡聖同居土羅漢見為七寶琳琅謂之方便有餘土菩薩見為淨妙五塵謂之實報莊嚴土諸佛見為法身祕藏謂之常寂光土良由聖人者心珠瑩淨性水澄清空不生華目無翳眚法華經云常在靈鷲山及餘諸住處衆生見劫盡大火所燒時我淨土不毀天人常充滿楞嚴經云如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見此其證也然有二途以隱言之赤城支提即台山是實報石梁方廣即台山是有餘也以顯言之如寒山文殊拾得普賢雖見量異於常人終是凡聖同居土耳其示現事蹟下靈異考具書今列隱顯兩門以為聖僧通考隱石橋方廣寺按西域志云天台山石梁橋方廣寺五百羅漢之所住持其靈異事蹟往往稱著如晉白道猷尊者陳智者大師皆覿面相呈事非影嚮大聖隱顯故不可得而思議者也見靈異志赤城支提山華嚴經菩薩住處品云東南方有處名支提從昔已來諸菩薩衆於中止住現有菩薩名曰天冠與其眷屬諸菩薩衆一千人俱常在其中而演說法清涼澄觀大師謂支提梵語此云可供養處即塔之異稱惟東南方有赤城山其形如塔且其巔又有舍利寶塔故也古稱清涼為文殊化身則指赤城為支提斷可信矣顯東晉曇猷尊者竺曇猷或云法猷即白道猷也燉煌人少苦行習禪定後游江左止剡之石城山乞食坐禪嘗行到一蠱家乞食猷祝願畢忽見蜈蚣從食中跳出猷快食無他興寧中至天台山舊傳赤城有五百大神居之言輒降禍猷至遇一嫗問途忽有負而投諸淵者猷飛錫救之水立涸今乾溪是也住石室坐禪有猛虎數十蹲在猷前猷誦經如故一虎獨睡猷以如意扣虎頭問何不聽經俄而羣虎皆去有頃壯蛇競出大十圍循環往復舉頭向猷經半日復去後一日神現形詣猷曰法師威德既重來止此山弟子輒推室以相奉猷曰貧道尋山願得相接何不共住神曰弟子無為不爾但部屬未洽法化卒難制語遠人來往或相侵觸人神道異是以去耳猷曰本是何神居之久近欲移何處去耶神曰夏帝之子居於此山二千餘年寒石是我舅所治當還彼住尋還山陰廟臨別執手贈猷香三奩於是鳴鞞吹角凌雲而去天台懸崖峻峙峯嶺切天古老相傳云上有住精舍得道者居之雖有石橋跨澗而橫石斷人且莓苔青滑自終古已來無得至者猷行至石橋聞空中聲曰知君誠篤今未得度卻後十年自當來也猷心惆然乃退道經一石室於中憩息俄而雲霧晦合室中盡鳴猷神色無擾明旦見人著皂衣幘來曰此乃僕之所居昨行不在家中遂致騷動大深愧怍猷曰若是君家請以相還神曰僕家室已移請留無辭於武帝太元八年入寂於山室尸猶平生而舉體皆緑義熙末隱士褚世標入山登巖見師不朽其後欲觀者輒為雲霧所蔽無得窺也雜見高僧神僧傳并舊志梁定光禪師青州人姓許字靜照大同初隱佛隴居山三十載迹晦道明易狎難識有所懸記多皆顯驗蓋神人也智者大師未至前二年預告山民曰大善知識當來相就宜種豆造醬編蒲為席更起屋待之陳太建十三年坐滅凡三瘞體骨湧出後置殿乃已舊傳錫杖尚留在昌安即會稽隆安也雜見天台別傳及南山傳神雍高僧傳隋普明禪師會稽朱氏少有異志有僧勉令出家因語曰天台有初依菩薩現身說法可往依之陳太建十四年來天台值智者講禮足歸依智者笑曰宿世願力今復相遇於是服勤左右專習禪法行方等般若諸三昧隨智者至廬山於陶侃瑞像閣行道感異僧為改法京之名為普明既居國清以取水為艱指其石曰此石出水不亦快乎泉即湧出日給千衆今錫杖泉是也嘗鑄丈六盧舍那像感異人施金為助國清講堂狹小師欲廣之章安禪師勸勿改俄而括州都督周孝節施杉柱泛海而至章安在赤城忽見師身十餘丈高出林表翼從數十人語章安勿苦諫吾所作當有成章安感其神異望林合掌致敬曰當依仁者區畫創堂之日感山神隱形而至勢若雷震摧樹折枝闊一步許自佛隴下至於寺日暮還返聲如初至比房聞師與之共語多勸神為善建堂既畢忽著破衣與衆言別奄然坐逝信宿屈左三指表證三果云統紀聖者頭陀初憩國清寺顯異甚衆一日詣雷馬山伐木建殿運神通致雨木皆蔽流而下雷馬潭有頭陀菴舊郡志作五代人統紀唐行滿禪師萬州南浦人首造石霜學禪法後往天台聽荊溪說止觀頓悟妙旨因棲止華頂峯下智者院充茶頭夜坐土牀燒糞掃以暖其下脫衣就牀蚤虱羣唼伺其飽足又復整衣而坐所居檻外大松上有寄生小樹遇師出坐必嫋嫋低俯時謂此樹為茶頭作禮師於四十年間未嘗便溺或謂大士現身受食而實不食故致此也開寶中預告門人曰我且行矣即請衆誦文殊號泊然而化年八十八嘗著涅槃疏統紀靈默尊者俗姓宣氏毗陵人也初參豫章馬大師因住白沙道場經十二載猛虎來馴近林産子意有所依又住東道場地僻人稀山神一夜震雷暴雨懸崖委墜投明大樹倒欹菴側樹枝交絡茅苫略無少損遐邇聞旃皆來觀歎後遊東白山俄然中毒而不求醫閉關宴坐未幾毒化流汗而滴身乃復常元和初久旱民皆狼顧默沿澗青蛇夭矯瞪目如視默咄之曰百姓枯渴苗死汝胡不施雨救民耶至夜果大雨合境云足民荷其賜厥後澡沐焚香端坐繩牀而卒壽七十二法臘四十一神僧傳明淨禪師高密人少出家味定為業後南遊東越天台諸山禪觀在懷無緣世習而衣服縷動止適時同侶禪徒未知弘仰山粒致絶日至村中每從乞食賫還中路值於羣虎皆張口閉目若有饑相淨以匙抄飯內其口中餘者對而噉盡告曰知來食少輒濟自他殊不副懷深用多愧明日乞食虎又如前嘗值亢旱苗稼並枯淫祀之流妄祈邀請雖加懇惻終不能致淨曰可罷諸邪禱吾獨能降遂結齊靜室七日平旦雲布雨施高下滂注不測存沒同霑豐干禪師不知何許人居天台國清寺或云邑人豐尚書之子形貌寢惡被髮布裘或時唱歌人問之第云隨我騎虎遊松門與寒山拾得三人相親每邂逅則長吟大笑人莫測也寒山問古鏡未磨時如何照燭師曰冰壺無影像猿猴探水月山曰此是不照燭也更請道看師曰萬德不將來教我如何道寒山拾得俱作禮而退師欲遊五臺問寒山拾得曰汝共我去遊五臺便是我同流若不共我去不是我同流山曰你去五臺作恁麼師曰禮文殊山曰你不是我同流師獨入五臺逢一老人便問莫是文殊麼曰豈有二文殊師作禮未起忽然不見正觀中太守閭丘胤遇師於京邸問天台有何賢可親答云國清寺有寒山文殊拾得普賢狀貌風狂歌笑不常見之不識識之不得取相閭丘至則二人方據火談笑乃遽作禮二人拍手笑云豐干饒舌饒舌彌陀不識禮我何為遂馳走而去後竟不還豐干後復天台示寂諸傳寒山子不言氏族以其寒石山中居止得名容貌枯悴布襦零落以樺皮為冠曳大木屐時來國清寺就拾得取衆僧殘食菜滓食之或廊下徐行或時呌噪望空謾罵寺僧以杖逼逐翻身撫掌大笑雖出言如狂而有意趣因衆僧炙茄次將茄向一僧背上打一下僧回頭山呈起茄串曰是甚麼僧曰這風顛漢山向傍僧曰你道這僧費卻多少鹽醬因趙州遊天台路次相逢山見牛跡問州曰上座還識牛麼州曰不識山指牛跡曰此是五百羅漢遊山州曰既是羅漢為恁麼作牛去山曰蒼天蒼天州呵呵大笑山曰作甚麼州曰蒼天蒼天山曰這厮兒有大人之作嘗得詩輒題樹石間好事者隨録之得三百餘首名寒山詩諸傳拾得子不知名氏因豐干山中經行至赤城道側聞兒啼聲遂尋見一子可數歲因名拾得在國清廚內滌器常日齊畢澄濾食滓以筒盛之寒山來即負之去一日掃地寺主問汝名拾得因豐干拾得汝歸汝畢竟姓箇甚麼拾得放下掃叉手而立主再問拾得拈掃掃地而去寒山捶胸曰蒼天蒼天拾得曰作甚麼山曰不見道東家人死西家人助哀二人作舞笑哭而去國清寺半月誦戒衆集拾得拍手曰聚頭作相那事如何維那叱之得曰大德且住無嗔即是戒心淨即出家我性與你合一切法無差時僧道翹纂寒山詩以拾得偈附焉見傳燈録代病尊者天台人也姓陳氏於國清寺出家因戒法登滿誓志觀方初止東京次於河陽為民救旱按經繢八龍王立道場啓祝畢投諸河舉衆咸覩畫像沈躍不定斯須雲起膚寸雷雨大作千里告足自此歸心者衆先是三城間多暴風雹動傷苗稼雉堞號稱毒龍為害代病為誦密語後經歲序都無是患共立堂宇若生祠焉大厯元年登太行遊霍山深入幽邃結茅而居有盜其盂食俄見二虎據路會逢代病盜叩頭陳悔慰諭畢因摩挲虎頭如是纍伏猛獸其中山神廟晉絳之間傳其肹蠁代病入廟勸其受歸戒絶烹燀牲牢其神石像屢屢隨勸頷首聽命由是檀信駢肩躡踵有置毒於酒者賄貧女往施之代病已知貧女紿曰妾家醞覺美酌施和尚求福况以佛不逆衆生願代病曰汝亦是佛耶貧女懼反飲具以情告代病執杯啜之俄爾酒氣及兩脛足地為之僨裂聞者驚怪以酒供養自茲始也汾隰西河人有疾只給與淨水飲之必瘳貞元中奄然跏趺示滅師𥳑尊者初憩天台戲龍院時大旱有龍臥巖閒𥳑以杖扣之隨即雱𩃱𥳑善書求者多以鵝酒易之韶國師常語人曰此𥳑羅漢也後示寂於錢塘其徒迎其骨建塔於無相院道育尊者新羅國人也自唐景福壬子歲來遊於天台遲回而挂錫於平田寺衆堂中慈愛接物然終不捨島夷言音恆持一鉢受食食訖略經行而常坐脅不著席日中灑掃殿廊料理常住得殘羡之食雖色惡氣變收𫎓於器齊時自食與僧供沐浴煎茶遇薪木中蠢蠢乃置之遠地護生偏切所服大布衲其重難荷每至夏首秋末日昳乃裸露胸背䏶腨云飼蚊蚋蛭雜色蟲螫齧至於血流於地行之四十餘載未嘗少廢凡對晤賓客止云伊伊二字殊不通華語然其會認人意且無差脫頂髮垂白眉亦龐焉身出紺赤色舍利有如珠顆人或求之隨意皆獲至晉天福三年戊戌歲十月十日終於僧堂中揣其年八十餘耳寺僧舁上山後焚之灰中得舍利不可勝數或有得巨骨者或云凡供養羅漢大齊日育則不食人或見迎羅漢時問何不去殿內受供口云伊伊去或云飼蟲時見羣虎嗅之盤桓而去宋德韶國師處州龍泉陳氏子年十五梵僧勉令出家遍參諸方後於法眼禪師語下開悟以語白師眼曰汝向後當為國王所師致祖道光大尋回本道遊天台山覩智者大師遺蹤有若舊居師復與智者同姓時謂智者後身初止白沙時忠懿王為王子時刺台州嚮師之名延請問道師謂曰他日為霸主無忘佛恩後嗣王位遣迎之申弟子之禮螺溪淨光大師言於師曰智者之教年祀浸遠多有散失今新羅國其本甚備自非師慈力其孰能致之師於是聞於王王遣使及齎師之書往彼國繕寫備足而回有興教明師年方弱冠聽經於螺溪常自疑云飲光持釋迦丈六之衣披彌勒百尺之身正應其量為衣解長耶身解短耶時國師居雲居明往問之國師曰座主卻是汝會明慍色拂衣而退國師曰吾若答汝不是當有因果明回螺溪口即吐血淨光大師驚曰此新戒觸忤菩薩人來明舉前話淨光曰汝不會國師意速去懺悔明具威儀詣前悲泣作禮首過國師為頌出前語云佛佛道齊宛爾高低釋迦彌勒如印印泥明自此疾瘳歸謝淨光師曰非師指教幾喪此生師有偈曰通玄峯頂不是人間心外無法滿目青山法眼聞曰即此一偈可起吾宗開寶四年辛未華頂峯忽摧聲震一山師曰吾非久矣明年六月大星殞於峯頂林木變白師乃示疾於蓮華峯參問如常二十八日集衆言別跏趺而逝二師口義云玄弼山君言國師是智者起法堂都料淨光大師是放生會首螺溪堂僧是所放之魚道榮尊者淳化中居長隴院即今廣巖寺習禪定靈異頗多人以羅漢目之既入滅人有見於壽昌五百應真位者今肉身尚存凡有所請多響應宋元符閒縣令太史章以久旱他求無驗躬往拜請迎至縣雨即充洽尋送還寺作長歌以頌其德碑刻尚在寺中惟靖尊者吳門人也年三十許入寧國寺巡僧房唱曰要人出家請留下至經藏院見大德慧政便跪拜申誠願容執侍政公允納與之剃染嘗侵星赴禪林寺晨粥而多虎豹隨到寺門虎踞若伺候靖出復隨遲明巨跡極多靖恐人知以鋤滅虎跡俄患背疽困睡有鴆鳥糞於瘡所不久全愈又虞冰雪備粳粒半斗每日以銚合菜煮食置粳於地窖中過期用米常滿不耗靖乃築之去曰吾被此知非理也卒時年七十餘神僧傳國朝裘聖僧邑人幼歲出家為僧住國清寺後又遊外二十年而歸訪親周氏周有婢適其採桑遭師遽擁抱之以手執其頸類解縛狀婢驚怒告其主主曰出家人何輕薄如此師曰七日後當自知之主訝其語至日置婢於室以人守之夜分守者少睡醒視婢已經死矣問師師曰昔見鬼以十索繫其頸吾斷之恨尚其一耳華頂寺僧請師預道場師曰明午有火殃到寺正日必有火我不預也明午一婦人從轎馬婢僕投寺中施齊至晚寺中人問曰火殃何在師曰施粥婦人非火殃耶忽火從中起一寺為墟健跳楊千戶妻施師履師亟穿走泥𣾈中楊妻心悔師知之遂還其履視之如未嘗著土中嘗㩦一少孫出遊途遇虎馴伏於側孫歸語家人師摩其肩曰莫說莫說遂失音師化後乃能語世傳伏虎禪師後身也其神通事蹟甚多父老猶能言之舊志附唐懷玉禪師丹丘人觀想淨土將四十年日課佛名五萬誦淨土諸經通三百萬一日見西方聖衆有擎銀臺而至師曰如我本望必得金臺言發而臺隱師彌加精苦三七日後向人復來曰法師已得上品生忽異光照室越三日書偈曰清淨皎潔無塵垢蓮華化生為父母我經十劫修道來出示閻浮厭衆苦一生苦行超十劫永離娑婆歸淨土弟子見佛菩薩共御金臺西下迎玉而去台州知府段公有詩讚曰我師一念登初地佛國笙歌兩度來惟有門前古槐樹枝低秪為掛金臺統紀附宋戒闍黎臨海三江婁氏子也母夢月光入懷覺而有孕生而能言曰善哉父母生我劬勞長度羣生為世沃焦父母驚而不言遂名頓吉一日忽謂母曰可備齊七位母問其故兒曰我同衣來相見父母怪之即為營齊俟之日晡果有僧七人撫掌打拍徐徐行至其家其父命坐大德何來僧曰南印土來聞君有奇子特來相賀其父曰何勞尊重遂設齊食罷母抱兒出見僧謂兒曰仁者有情軌則惺惺著勿被他瞞兒乃撫掌而笑僧遂謝去兒謂父母曰向者七人皆佛菩薩示現爾五歲自稱六和大師十五出家至杭見天醫波利多問曰子何來師曰從緣來曰是何姓曰是佛性曰子身尚俗安識佛姓師曰我身雖俗因俗證真真俗圓融洞然不二無二之法即是佛性波利多異之乃為剃髮受具足戒故名善戒其神變事跡至多具見闍黎示現録將滅之日於台州兜率寺擊鼓集衆為說觀音圓通法門乃下座出殿前湧身虛空現諸神變還入殿內復升法座連呌大衆看看先於左手現日右手現月放八寶光明次於口中現蓮華十二朵花放寶光十二色又於頂上放無數光光光八稜中空師曰老僧有如是妙用以彰釋迦如來正法大衆老僧世緣已畢與汝作別言訖合掌而逝闍毗之次胸中迸裂三昧性火自焚五色祥雲圍繞異香芬馥舍利無數奉瘞於寺永鎮山門太守趙邦彥聞於朝諡號曰廣惠慈濟寧化仁德大師周七娘周婆臨海紫巖人周姓諱七娘行乞於市逍遙度日夜臥普濟橋下每與戒公同遊歌云笑殺愚癡漢營家無歇時四山若來合妻子各分離又歌云世人都笑我我笑世間人如意摩尼現無人識本真時人莫測其凡聖皆掩口笑曰風僧風婆吃酒蹉跎一日聞戒師化去亦於普濟橋下瞥然而化口中左右皆生蓮花越七日有異僧眉髮皓白跣足百衲携錫持鉢歌曰戒師文殊周婆普賢隨肩搭背萬世應傳言訖不見故知闍黎是文殊周婆是普賢愍茲五濁特示現也傳燈議曰戒公七娘寒山拾得雖異代出興本迹大同且文殊普賢為釋迦如來上首弟子乃兩世降生茲土特於台民慈悲猶尤孰謂台邦非佛國乎又孰謂台民無有大因緣乎燈故附入以顯菩薩之應現無方也濟顛禪師天台人父李茂春高宗李駙馬之後拜春坊讚善隱於天台母王氏夢吞日光生師年甫十八二親繼喪投杭州靈隱寺出家後居淨慈逆行順行言行叵測其濟物利生神通感應事蹟至多見濟顛語録乃天台五百應真之流也滅後數日有二行腳僧遇師於六和塔復附書歸書後有頌云看不著錯認笊籬是木杓昨夜三更月正西麒麟撼斷黃金索幼年曾到雁門關老去分明醉眼看憶昔面前當一箭至今猶自骨毛寒只因面目無人識又往天台走一番其平生出言大都類此補遺晉曇蘭尊者青州人少蔬食樂禪誦經三十萬言晉太元中遊剡後憩始豐赤城山見一處林泉清曠而居之經於數日忽見一人而形長數丈呼蘭令去又見諸異形禽獸來以恐蘭見蘭恬然自得乃屈膝禮拜云珠欺王是家舅今往韋卿山就之推此處以相奉爾後三年忽聞車騎隱隱從者彌峯俄而有人著幘稱珠欺王通既前從其妻子男女等二十三人並形貌端整有逾於世既至蘭所暄涼訖蘭問住在何處答云樂安縣韋卿山久服風聞今與家纍仰投乞受歸戒蘭即授之受法竟嚫錢一萬蜜二器辭別而去便聞鳴笳動吹響震山谷蘭禪衆十餘共所聞見晉元熙中卒於山春秋八十有三矣宋僧從尊者縣志作從一依僧史為正未詳何許人稟性虛靜隱居始豐瀑布山學兼內外精修五門不服五穀唯餌棗栗年垂百歲而氣力休強禮誦無輟與隱士褚伯玉為林下之交每論道說義輒留連信宿後終於山中普耀尊者初憩天台有巖如室師居之有神江白郎告曰此吾居也以師德業尊廣願推此室相奉遂呼為白巖後即其傍建寺因名之齊慧明尊者姓康康居人祖世避地於東吳明少出家止章安東寺齊建元中與沙門共登赤城山石室見猷公尸骸不朽而禪室荒蕪高蹤不繼乃雇人開剪更立堂室造臥佛并猷公像於是栖心禪誦畢命枯槁後於定中見一女神自稱呂姥云常加護衛或時有白猿白鹿白蛇白虎遊戲階前馴伏宛轉不令人畏齊竟陵文宣王聞風祇挹頻遣三使殷勤敦請乃暫出京師到第文宣敬以師禮少時辭還山苦留不止於是資給發遣以建武之末卒於山中春秋七十梁天花尊者梁普通閒來遊天台去縣西南四十里有巖高廣挺峙師以神力擘開感天雨六花人稱師為天花尊者今開巖寺是其遺蹟又慧實慧達俱梁時人慧實姓許氏穎川人梁末至天台禪定絶跡人世五十年自少至終脅不至席慧達姓王氏襄陽人幼年入道後居天台瀑布寺大業六年終於揚州二人皆有道高僧也今姑附此唐長臂尊者蓋西土僧也其臂甚長因以為名其神通事極多土人猶能傳之闍提首那尊者於平田寺大著神力舊有釜極深廣是其所鑄寺後過溪有西天大師菴肉身尚存朗月和尚普航和尚靜海和尚景茂和尚恆慈和尚悟來和尚修基和尚光本和尚旭山和尚濟南和尚明光和尚成茂和尚所清和尚已上各助英洋二元光緒拾九年桂月天台山真覺寺敏曦募刻
