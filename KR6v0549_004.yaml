body:
  text: 山寺考第五夫僧居之稱寺者蓋九寺之列也昔漢明帝時佛法初至迦葉摩騰竺法蘭以沙門服謁見館於鴻臚寺次年敕𨿅陽城西雍門外立白馬寺以鴻臚非久居之館故別建以處之蓋僧本西方之客朝廷始終待以賓禮又本以白馬負經而來馬死葬此故以名寺後世僧居凡稱寺者以此天台山水秀甲東南而梵苑居多古稱有七十二寺今考縣志所書惟六十二且存廢相半此足以驗道德之盛衰人時之臧否也且台民鮮富薄於檀波僧食皆仰給於窮山溪梁便益則就下為田厥土剛燥或依岡為地刀耕火種力實倍之復以山林深邃龍崇據為窟宅故朝風暮雨陰晴無恆晴多則禾不秀雨多則稻少實惟適中之年乃可有秋更有處高當風者將登而儉謂之一夜窮田已為魃鬼之佃民還作狴牢之逋客故台山之田下田也台山之寺窮寺也台山之僧苦僧也而糧差復倍於恆民以故僧寺日窘而僧德日涼其有以道德而自負者則必深入無人之境灰頭垢面向折腳鐺邊自修自度然樂則樂矣其如像教凌替乎或誡之曰曷不就本業則對之曰余役僧也本業未暇也吁僧本出世之士今也稱役豈不貽吾輩之羞嘗原古昔聖君常以道德期僧必命當道宰官牒請名德沙門住持所以嚴責本寺誡朂方來故逢冬夏結制之後人間無遊行之僧解制之後寺舍亦無專住之主其來也必驗戒牒以別真僞其去也必給由帖以考功過有由與牒者始容掛搭否則逐之故寺無不律之僧人兼定慧之學此實住持切磋之功有司作成之德也今則不然責僧以道德而畜僧以常民况有甚於此者豈惟僧之恥亦始作俑者不知尊尚釋教之恥也然為吾徒欲處於今之世者固當克勤本業惟佛是務藉山林為道具借僧寺作資糧衣鉢之餘無所願慕世調不堪置之度外經云天龍恭敬不以為喜為一真住山僧庶不辜如來之恩也今具列僧寺若干道觀若干菴院共若干興廢存沒並録之以俟有道力者中興焉國清寺在縣北一十里十一都舊名天台昔智者大師於陳太建七年秋九月初入天台厯游山水度石梁履降南門荏苒淹留未議卜居常宿於石橋見有三人皂幘絳衣有一老僧引而進曰禪師若欲造寺山寺有皇太子寺基捨以仰給因而問曰止如今日草舍尚難當於何時能辦此寺老僧答曰今非其時三國成一大勢力人能起此寺寺若成國即清當呼為國清寺後將滅時方標指山下處所殿堂又畫作寺圖以為式樣囑誡僧衆如此基陛儼我目前棟宇成就在我死後我必不覩汝等見之若造寺一依此法弟子問曰此處山澗險峙有何緣力能得成寺答曰此非小緣乃是王家所辦因囑書貽晉王有云天台頂寺茆菴稍整山下一處非常之好願更仰為立一伽藍始剪木位基命弟子營立不見寺成瞑目為恨晉王命司馬王弘依圖造寺山寺秀麗方之釋宮創寺已後即冊為東宮後煬帝敕揚州衆僧參立寺名弟子智璪啓云昔陳世有定光禪師亦曾見夢於先師曰寺若成國即清當呼為國清寺帝敕曰此是我先師之靈瑞即用即用可取大牙殿榜填以雌黃書以大篆付使人安寺門實隋開皇十八年建大業元年賜此額李雍記所謂應運題寺是也唐會昌中廢於寇火隋煬帝與大師帖真蹟僧清觀拾於煨燼之中僅存一二大中五年重建散騎常侍柳公權書大中國清之寺六字天台佛三字批僧清觀狀尾附今亡宋景德二年改景德國清寺前後珍賜甚夥合三朝御書幾百卷後燬於寇獨大師所題蓮經與西域貝多葉經一卷及隋旃檀佛像佛牙僅存建炎二年重新之四年詔易教為禪上方有兜率臺左右有五峯雙澗號四絶之一上有三賢堂謂豐干寒山拾得也有錫杖泉香積厨訶羅大神像寺前有新羅園東南有祥雲峯拾得巖東有清音亭其最高處有更好亭後巖有瀑布循澗而下尤為奇勝元時禪教互爭一謂大師為開教之祖一謂大師為禪宗攻擊鬬訟時有浙僧觀無我定為禪至正辛巳邑人胡榮甫建山門有僧朂宗冕來主法席於舊址建雨華亭方丈築萬工池未幾寺僧相攻遂廢國朝洪武甲子大風雨作方丈佛殿御書閣鐘樓盡為摧毀惟土地堂雨華亭山門僅存至三十一年蘊中瑄公乃移土地堂於雨華亭東始為丈室以居自後寺僧相繼稍稍補葺非盛時比矣雨華亭嘉靖庚申燬隆慶庚午重建大雄殿隆慶燬萬厯乙未本府節推劉啓元臨海鄉宦王士嵩本寺僧會性芳致書請杭州靈隱寺法師如通命徒性省如楷真遜輩募緣重建本邑耆民許榜捐百金為助資萬厯壬寅內官黨禮賫賜御經一藏飯僧銀一千兩建藏閣銀五百兩僧性冲護藏建閣大慈寺大慈寺在縣北二十九里十一都舊名修禪或名禪林陳太建七年為智者大師建蓋大師思修十二地此惟厥初實定光佛授記銀地所直寺門巽隅號佛隴大師第二宴坐處隋創國清乃更寺為道場唐會昌中廢咸通八年重建宋大中祥符元年改今額其法堂曰淨名以大師嘗講是經故也又有大師所供普賢及手書陀羅尼經隋朝所賜寶冠有潄玉亭又有虞世南所書華嚴經紹興中為秦檜取去國朝洪武十七年八月殿宇為風雨所壞僧德興重建臨海楊畋為之記張性中遊佛隴記有高麗銅鈴杵永樂初尚存天封寺在縣北五十里十一都陳太建七年智者大師建初大師入山見一老父告云師卜菴遇盤石可止其後果如所告遂結廬焉因自號靈墟蓋第五思修地其注涅槃經處號智者嶺中有卓錫泉北望一峯摩雲即華頂也隋開皇五年賜號靈墟道場漢乾佑中改智者院宋大中祥符元年改壽昌寺治平三年改今額舊有瑞雲閣善興寺在縣東北六十里十一都舊名華頂圓覺道場晉天福元年僧德韶建蓋智者嘗宴坐於此故上有降魔塔伏虎壇鬼疊石又有太白書堂甘泉先生居歲久蕪翳舊傳又有葛玄茶圃王羲之墨池然無所據宋治平三年改今額國朝洪武四年燬於火大殿山門獨存十年僧宗濟重興復廢隆慶間括蒼僧真空真性者結茅於此禪誦六時甘苦與方來者共四方仰之今其孫性裕者能繼其業未幾燬於火復鼎新之欲為鐵瓦殿尚未卒業寶華寺在縣東六十里四都舊名太平唐乾符二年建宋治平三年改今額禪林寺在縣西南一十五里十九都舊號龍山集雲院隋智者大師建唐天寶六年改龍山為始豐宋乾德二年號龍山崇修院大中祥符元年改今額東安隱寺在縣東六十里一都舊名隱嶴漢乾佑三年建宋治平三年改今額石橋寺在縣北五十里十五都舊傳五百應真之境又有方廣寺隱其中宋建中靖國元年建後燬於火紹熙四年復新之中有應真閣妙音響空瞻風伫真許來方廣先照諸亭俱廢惟曇花亭獨存焉萬厯甲辰錢塘居士葛一鵬重新之普慶寺在縣東北三十里十都舊名保興福慶院晉天福四年建宋治平三年改今額慧明寺在縣東北六十里五都華頂峯上舊名慧日俗又呼東峯梁乾化元年建宋治平三年改今額後廢今之慧明不知其所始豈華頂廢後更徙於此耶智者大師所書陀羅尼經四卷舊在大慈今傳於此宋時已亡失惟留其一嘉靖間又為談海憲取去今所存是宋元通法師補書者崇法寺在縣東五十里五都五代願齊法師建吳越國王賜師號崇法寺因名焉大智寺在縣東五十里四都宋開寶七年建太平興國初賜號大明治平三年改今額護國寺在縣西北三十里十四都舊名般若周顯德四年建蓋僧德韶第九道場宋大中祥符元年改今額後錢太師忱家乞為香燈院加廣恩白巖寺在縣西北三十里十四都宋末僧普耀初憩此地有神江白郎告曰此吾居也以師德業尊廣願推此室相奉遂呼白巖隋大業中僧純陀徙平地五十步唐貞觀十年賜號白巖寺會昌中廢咸通二年重建加咸通宋大中祥符六年改賜妙智寺今復為白巖寺舊有列秀亭及王羲之墨池存焉大同寺在縣東北九十里十一都舊在嶴西名菩提大同周顯德五年建後徙今地宋治平三年改大明院今復為大同寺宋如菴主塔於此太平寺在縣東北二十五里十一都白雲峯側舊名雲峯梁乾化元年建前對香爐峯又有宴坐峯石石鼓石牀看經臺皆智者大師經行處也舊有雷峯堂并白雲堂宋太平興國五年改今額洪武初年廢永樂間重新復廢萬厯間檇李太史馮開之贖田命僧重建今尚寢如無相寺在縣西南三十五里二十三都舊在瑞龍巖北名戲龍唐咸通二年建時有僧師簡以杖叩臥龍起雨故名遠近勝槩凡十瀑布潭石門徑鹹水澗瑞龍天柱香爐紫凝應澤五峯寶陀羅漢二巖宋祥符元年改今額治平中徙今處寒巖寺在縣西七十里三十六都寒石山舊名崇福梁開平元年建蓋寒山子棲遁處周顯德中改聖壽昭儀孫氏重新之由明巖北五里而上四山聳秀水流亂山間鏘如佩環院宇周匝並置巖下窗扇軒戶開闔於烟雲紫翠中故南山之標勝者推寒明二巖宋大中祥符二年改福善院今為寒巖寺明巖寺在縣西南七十里三十三都舊名雲光院號暗巖周顯德四年吳越昭儀孫氏捨資俾天台鎮將陳希靖建即僧全宰棲禪處更名明巖介居巖谷間道狹不容軌入門兩石夾峙號石門前對幽石橫敞飛閣巖竇嵌空堂宇半居巖下大槩如寒石山宋開寶七年升為寺祥符元年改大梵國初歸併今復為明巖寺有十景雲棲洞攝石八寸巖初來菴瀑布水索幽石重巖洞門響巖舊傳寒山拾得隱身之地今巖中有人跡髣佛俗稱閭𠀉太守云萬年報恩寺在縣西北六十里十五都唐太和七年僧普岸建圖經云隋大業二年建初晉興寧僧曇猷憩此四顧八峯回抱雙澗合流八峯謂明月娑羅香爐大舍銅魚藏像煙霞應澤以為真福田也遂經始焉會昌中廢大中六年號鎮國平田梁龍德中改福田宋雍熙二年改壽昌建中靖國初火崇寧三年重建號天寧萬年紹興九年改報恩廣孝為光孝今復為萬年先是宋大中祥符天禧中纍賜袾衣寶蓋及御袍曳履諸珍玩甚衆故有親到堂以仁宗賜衣時如朕親到之語故名有妙蓮閣覽衆亭淳熙十四年日本國僧榮西建山門兩廡仍開大池香積有釜極深廣世傳闍提首那尊者所鑄東南十里有嶺曰羅漢巨杉偃蹇潔之大百圍凡供五百大士於是邀請寺後過溪有西天大師菴生身尚存萬厯十五年慈仁明肅皇太后頒賜藏經并紫方袍僧明曌弟子真秀相繼主其事建尊經閣并法堂禪室淨慧寺在縣西九十里舊名寶慈唐乾化元年僧景瑫建蓋天台十大剎之一也舊為隋高僧飛錫處及是瑫卓菴已而造寺燃柏香密禱以煙至處為址焉宋大中祥符元年改今額舊傳葛玄嘗植蘆數本故今寺前有蘆峯澄深寺在縣北一百三十里十一都舊號澄明宋治平三年改今額廣嚴寺在縣西五十里二十九都舊名長瓏唐光啓三年建凡三徙至今地宋治平三年改今額舊傳寺鑄一鐘屢不就有老嫗施一錢投於冶中鐘即成而錢宛然在焉號貧婆鐘有懷容羅漢真身在焉真覺寺在縣北二十三里十一都隋開皇十七年建智者大師葬焉龕前置雙石塔號定慧真身塔院有繪像與所賜方袍今亡宋祥符元年改今額後久廢隆慶間僧真稔重興佛殿僧房高明寺在縣東北二十里十一都按舊經本名高明唐天祐七年建今考所藏錢氏遺墨乃清泰三年號智者幽溪道場今殿前有石經幢刻云天福二年捨入幽溪禪院可驗也宋大中祥符元年改淨名不知何時復今額古老相傳謂先此惟喬木參天薜蘿翳坎麏䴥是居樵牧罕至智者大師時居佛隴講淨名經忽經為風飄翩翩不下乃杖錫披荊尋經所詣行五里許風息而經憩此大師觀斯靈異復愛茲山峯巒秀發清溪鑒心乃即其地以營淨居智者十二剎此其一也故其後或寺稱淨名堂名翻經皆不忘大師之遺