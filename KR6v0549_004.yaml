西峯上遺則卓菴居之唐會昌中廢後為昭慶院元復為佛窟寺今廢實相寺在縣西南七十里二十五都舊名彌陀塔院蓋僧德韶第七道場周顯德中建宋大中祥符元年賜額今廢西竺院在縣西北四十里十一都舊名國泰唐大中十年建蓋智者大師著止觀之地前有溪流亦號幽溪道場宋大中祥符元年賜額今廢赤巖寺在縣南一十里二十都舊名寶壽觀音院周廣順初建宋治平三年改明聖院後為赤巖寺今廢金繩院在縣西五十里二十八都實棲禪支院宋慶厯中賜額廢秀巖寺在縣西北三十五里十四都舊名西雲晉天福八年建蓋僧德韶第三道場宋祥符元年改額今廢永寺在縣東北十五里十一都舊名普周顯德四年吳越王建宋治平三年改今額今廢桐溪寺在九峯山支遁逸少曾遊今廢西定慧院在縣西北三十五里十四都漢乾佑元年建蓋僧德韶第四道場宋祥符元年改今額今廢淨居院在縣西北十三里三十三都舊名華嚴菴蓋僧居月誦此經處宋治平三年改今額今廢金文藏院在縣西北六十里十五都蓋萬年支院漢乾佑三年建宋咸平二年賜今額太宗嘗賜大藏經五千二百卷護飾甚偉建中靖國初燬景福院在縣西二十五里十四都周顯德七年建俗呼茶院蓋僧德韶施茗處宋開寶三年賜號崇福大中祥符元年改今額今廢普慈院舊在蓮花峯頂名大慈院開寶七年建治平三年改額熙三年徙縣西北二百步今廢基為豪右所占淨名院在縣北五十里十一都舊名通玄定慧周顯德四年建蓋僧德韶第一道場宋大中祥符元年改額今廢金錢院赤城舊志載無考處所今三十六都有資聖寺近廢舊志不載金地菴在縣北二十五里十一都晉開運三年建以梁大同初僧定光卓菴居之巽峯有枯石數片屹然林莾間謂之招手石古語云定光金地遙招手智者江陵暗點頭其菴久廢今所遺者茆茨也石橋菴在石梁之左曇猷厥初修道遺址宋令丁大榮易置為龍君祠久廢嘉靖間僧真琥復建為菴其徒通乾達曇性又增廣之萬厯八年燈侍百松先師講法華於此靜夜每聞方廣有鍾鼓之聲宿佛菴在四顧坪正德間佛樹禪師創樹京僧也募太監張公永裝五百聖僧像時結茅於此萬厯間僧性珠徒理殊新之掘地得白磁瓶一并磚刻心經題云沙門佛樹識可驗也而臨海王司寇顏為宿佛蓋為是也萬松菴去石梁西五六里土名道人坑昔為有道者所居故名嘉靖間老僧明賢字隱山者重新之老僧雖龐眉皓髮而钁鑠過人類有道人之風其徒草堂如芳素菴如彬融心如圓皆為法師今真定海藏繼居而香火是賴修隱菴去石橋五里普陀僧如珂建珂為大智弟子智嘗有志歸老天名後示寂海潮珂為乞慈溪馮方伯以終師志王邑侯顏曰修隱沈外翰顏其嶺曰松雲燈為聯曰林間野石松為似石上枯藤雲作衣可想見也山陰劉仲倩特倩二居士建館攝靜於此館與華峯對燈為顏曰賓華仲倩自聯曰燈王座借來三萬香積飯擎出一盂圓通靜居在石橋菴左僧性悟偕錢塘葛君修曇華亭而尼僧性慧建菴於此延悟戾止燈每游石橋必假居之聞石梁瀑聲隱隱靜定中故為命名為之聯曰水在石梁宣般若洗空萬劫之塵心僧於方廣習圓通養長一生之聖種真福菴在石橋菴後後僧達建凡僧俗禮石梁者必先於此濯足更衣邑侯王公顏為真福寂光菴去石橋五里許土名遙尖萬厯六年僧真隱建寶福菴在縣西三十五里十六都今廢斷橋道場在縣北七十里十五都宋開寶元年建太平興國五年廢蓮社在崇報寺西宋嘉泰元年更旱不雨縣令丁大榮率緇徒詠蓮經於公宇踰時雨作因度地建堂名蓮社仍榜門之外曰為民祈福之所凡遇水旱祈禱於此後廢為豪右所占碧雲菴在十一都聖蹟石傍土名仙人鞋僧如宗創聖蹟菴與碧雲菴鄰僧如應重興圓覺菴在縣西三十里二十六都平頭潭鍾福菴在縣東門外崇善菴舊有靈溪館在縣東二十五里邑人奚蒙因其地而建之招僧施茶以濟行旅觀音堂在縣東一里九都舊有觀音堂在山川壇之右仁壽坊側邊臨清堂在縣南門外宮觀桐柏宮在縣西北二十五里十二都唐景雲二年為司馬承禎建回環有九峯玉女臥龍紫霄翠微玉泉蓮華華琳香琳玉霄是也宮當其中自福聖觀北盤折而上至洞門一望佳景豁然道書云桐柏金庭洞天即王子晉所治中有三橋一見二隱木則蘇玡琳碧泉則石髓金漿人得食之後天不老真誥云吳有勾曲之金陵越有桐柏之金庭三災不至洪波不登實不死之福鄉養真之靈境吳赤烏二年葛玄於此煉丹故今有朝斗壇齊永嘉元年征虜將軍沈約一千餘人弃官乞為道士居之唐睿宗景雲二年敕為承禎置觀號桐柏方置堂時有五色雲見唐史記以為祥禁封內四十里無得樵採五里不許遷葬徐靈府小録煉師所居黃雲嘗覆其上故有黃雲堂元晨壇煉形室鳳軫臺朝真壇龍章閣又有衆妙臺以篆隸八分三體寫道德經於巨幢置臺上故名堂下有醴泉極甘可以愈疾太和咸通間道士徐靈府葉藏質新之元稹劉處靜為記五代梁開平中改桐柏宮周廣順二年朱霄外建藏殿宋大中祥符元年改桐柏崇道觀政和六年又於後山建徽宗元命殿一如宮制瓦用青色琉璃於梭溪上建二橋橋上搆會仙亭直南嶺表建洞門一座內則方丈齊堂雲堂土地堂三真殿又有上清閣御書閣閟三朝宸翰及高宗所臨晉唐帖紹興二十二年楊和王存中重建三清殿曹開府勛建三門曹又於觀北結菴賜號冲嗇宮中為院六一曰經藏二曰三元三曰延賓四曰清虛五曰白雲六曰浴院屢朝宣賜則有宋太宗真宗御書共五十三卷祥符中御衣四事高宗史漢事實翰墨志用高麗僧統所織成經簾二帙裹吳越國王所捨銅像天尊一十身連金銀銅所鑄火焰臺座檀香三清像一龕計二百六十身玉花八株銅三清像金銀字經二百函睦親宅昭成太子宮聖蹟四十軸厯代珍襲供奉至國朝吳元年遘火化為𠀉墟惟檀香像一龕存焉洪武中道士金靜觀提點吳惟敬相繼營建永樂十年道紀鮑了靜又加新之其間架規模崇飾艷麗去舊為遠至今且百餘年道衆貧匱殿宇日就頽壞宮中碑刻無慮十數獨崔尚所作碑頌韓擇木八分書古今珍尚今亦無存矣其復改桐柏宮當在本朝但不知何時耳佑聖觀在縣東一百步妙山上即玄帝廟舊係城隍廟基宋南渡後曹開府勛建觀而境民崇奉香火不廢韓擇木斷碑在焉元明宮在縣西北二十八里桐柏觀之東北徐靈府小録由桐柏北上一峯可五里許唐長慶元年靈府定室於此寶厯元年賜號方瀛宋大中祥符元年改額今廢萬厯庚子釋子受行結茅於此竟為釋氏宮洞天宮在縣西北三十五里玉霄峯唐咸通間道士葉藏質創道齊號石門山居十三年奏為玉霄宮周廣順元年朱霄外建三清殿徐靈府小録云道士陳寡言嘗隱於此號華琳有經鐘二樓經皆咸通十一年書後題云上清三洞弟子葉藏質為姚劉四娘造永鎮玉霄藏中宋祥符元年改今額有禹鐘高三尺狀如鐸上有隱文又一大鐘漢乾佑二年鑄今廢仁靖純素二宮在桐柏觀左右元至元間桐柏道士王足菴遇世祖宣授仁靖純素真人遂於其右舊白雲觀基建純素宮又於其左即曹開府冲嗇菴基建仁靖宮今廢迎真宮在縣東十步其址今併為布政分司福聖觀在縣西北十五里桐柏山西南瀑布巖下赤烏二年為葛玄建初號天台額乃玄飛白書王右軍評其書如鳥鵲勢騫巑屼東北連丹霞洞有仙人拍掌巖西北枕翠屏上有三井號三絶之一泄為瀑布蔽崖而下狀似垂霓數百丈有濺珠亭觀前對靈溪觀中引瀑布縈繞廊院灌注池塘宋元嘉嘗於此創瀑布寺東北一百五十步有柳泌使君宅號紫霄山居今皆蕪歿惟玉清行刻流水巖洪武間大水瀉出而字多不辨矣又有隱真中峯蓋梁徐則所居之處唐咸通中刺史姚鵠因建老君殿得玉簡上之刻曰海水竭台山闕皇家寶祚無休歇詔付史館宋大中祥符四年改今額天聖五年遣中侍投金龍有布衣孟合附詩以進詔重新之紹興十一年置九天祠按衆真記夷齊死為九天僕射之說三十年楊侍郎偰妻趙以老君殿建三清殿陳古靈襄皇祐間來遊瀑布命名習養有記嘉泰二年令丁大榮立碑刻習養之瀑四字於石崖上國朝初併入桐柏白雲昌壽觀在縣西北二十五里桐柏觀西唐大中六年建舊名白雲菴宋乾道四年內侍鄺守弃官入道乞改菴為觀遂賜今額鄺後於觀側自創白雲菴今俱廢玉京觀在赤城玉京洞天之右宋政和八年賜額建觀未幾中廢嘉熙改元朝廷設醮祈禱天使詣投龍簡籍地行禮殊虧昭事時冲靜大師高惟幾闢田度址興建觀宇觀妙演道大師范善遷同盟助就郡守張號奏撥公田以助堂廚御前宣賜沉香斗真鐘磬及御書觀額拱辰殿扁安鎮觀門正殿崇奉徽宗本命聖君名清平萬壽殿縣令姚德輝敘其事今廢淨元觀在縣東三十里五都今廢聖壽院在桐柏觀西舊名延壽周廣順元年朱霄外建宋治平三年改今額今廢妙樂院在縣西北二十五里十二都即王喬仙壇前有石泉名醴泉泉南有上真亭去亭東二十步有八角井壇東有太子菴西有朝斗壇南去百步有吹簫臺北去三十步有瀛峯室唐僧靈一有題王喬觀傅道士所居今無此觀其景意疑即妙樂也舊有銅鐘自桐柏移來上刻唐景龍二年所鑄今已廢法輪院在縣西北二十五里桐柏觀西吳赤烏元年葛玄卓菴於此感三真人降授以貞一勸誡法輪妙經遂名臺曰降真漢乾佑中錢氏復為朱霄外新之仍造檀香像一百軀宋祥符元年改今額元至順間重修翰林學士虞集記今廢法蓮院在縣西北三十五里十二都唐咸通六年道士葉藏質建以層巒疊出狀似蓮花故號蓮峯道院宋治平三年改額今廢昭慶院在縣西北二十五里舊名佛窟唐大中六年建蓋僧遺則卓菴之地唐會昌中廢後道士劉處靜創聖祖殿越州刺史李褒奏聞賜號道元張仁穎為記宋祥符元年昭慶中有七星閣唐咸通中物也赤城全真道院在縣東二百二十步今廢鶴峯全真道院在縣東十五里十都元大德九年道士徐光孚建廢紫霄道院在縣西南三十五里舊志所載莫考都址桃源道院在縣西南一十五里二十都至元間道士陳貫道建今廢熙道院在縣西北二十五里宋咸淳七年道士徐自明建今廢養素道院在縣治之北至元間道士王中立建後廢基為豪右所占松隱道院在縣西二里二十都即曹忠靖勛松隱園今廢又興延真菴在縣西七里十二都落馬橋今廢思真菴舊志元至元間道士石好問建今無考處所臥雲菴在縣西北三十里十二都瓊臺之側至元間道士周正中建久廢奉化縣嶽林寺本泉和尚助英洋伍元高郵州華藏寺竹林和尚助英洋肆元天台山方廣寺授慧和尚助英洋叁元萬年寺成蓮和尚助英洋叁元光緒拾九年桂月佛隴真覺寺敏曦募刻
