body:
  text: 形勝考第四天台山高一萬八千丈周迴八百里山有八重四面如一復有四門智者大師以赤城為南門以新昌石城為西門徐靈府又以剡縣金庭觀為北門余謂準此當以王愛山為東門或者疑以為誕不知皆有所徵也蓋名山福地必有神聖呵衛不祥惟此台山自古及今無有虎豺之暴曾以是訊諸山民僉曰四門之內周環民居即有惡獸經由惟犬羊等物是殘見人則妥尾走匿草莽間審如是則所謂聖僧道場神僊窟宅信矣若取之則凡在台州屬境皆其區域以牛女分野何啻千里故唐宋已來以台州名郡蓋取乎此若約靈異以分山憑諸書以割地則自縣治以南皆非也然台雁二山皆東南勝境古人未有定其優劣者余始遊雁宕見其峯巒秀拔奇形恠狀將謂海內名山無有勝此及登天台山觀其規模宏大又恍然自失因而品曰雁宕山其猶李青蓮之五言古詩也天台山其猶杜拾遺之五言古詩也以子美之詩上薄風雅下該沈宋言奪蘇李氣吞曹劉掩顏謝之孤高雜徐庾之流麗盡得古人之體勢而兼昔人之所獨專近之故也蓋此山在下望之不啻千仞及昇其巔四通八達間皆可數十里如在平地其勝一也至登華頂峯頭東望大海南觀雁宕西矚栝蒼北眺錢塘一覽可盡其勝二也俯瞰羣峯皆在其下羅列環遶或如蓮葉或如華鬚恍疑一朵芙蓉浮於海上其勝三也僧寺道院桑麻相接鐘梵鳴於天上雞犬吠於雲中其勝四也雖極其幽邃之地皆明爽開豁使人襟抱蕩然其勝五也山與通衢左近車馬絡繹其下勝槩羅列其巔可望而不可到其勝六也山無背向四面如一其勝七也山有八支八溪為界以華頂為車軸山之周遭如八軸輪亦如八葉覆蓮其勝八也山產眾藥又多肥蕨黃精此足供居者糧其勝九也山林深遠即居民亦有未臻其奧者可以避隱其勝十也且赤城為其南標石城為其西固東蒼為其眉四明為其目中有瓊臺雙闕佛隴香爐石梁瀑布等諸景骨肉不偏形神俱妙所以為勝也此其梗槩耳若夫赤城建標珠林簇簇誰其淡諸霞紅雲綠則有赤城山之勝五峯環翠宮殿俱高雙澗奏響和以松濤則有國清寺之勝溪界山出路沿澗入瀑布龍湫涼風襲襲則有金地道中之勝金地在上壁立萬仞蒼龍委蛇濟以天磴則有金地嶺之勝竹塢茆茨踈磬間發法語琅琅金繩寶筏則有定光庵之勝古墖皇封與山巃嵸瞻之仰之萬世高風則有真覺寺之勝法流洙泗佛道康莊普賢境界修禪道場則有佛隴大慈寺之勝大雷峯下白雲精舍數里平原幽人命駕則有太平寺之勝路入羊腸身親龍闕山橡藤梨美哉膚核則有寒風闕道中之勝亦有桑麻非人間者豈軒轅丘廣莫之野則有長壽文殊西竺諸寺之勝萬山之中其嶺陂陀考槃之宮尚餘烟蘿則有察嶺下高察舊隱之勝此南門第一支取華頂之直道以南嶴溪為界也若夫放生池上碧水盈隄有物龍去猶名螺溪則有清心寺之勝長松數挺野廟披離昔人傳教今歸與誰則有傳教寺廢址之勝疊嶂千重溪梁百折泉落樹頭流雲噴雪則有螺溪道中之勝仰攀丹崖危磴半欹梯雲捫葛乃可探奇則有幽谿嶺之勝幽谿講肄車塵不喧山林盤欎別有乾坤則有高明寺之勝路隔三山可望難即松篁數家泉流上泐則有清涼寺遺蹟之勝下有寒泉藏蟄神龍石筍高峙砥柱虛空則有螺螄潭之勝溪南溪北上游下游經梵相聞以耕以修則有黃墰諸庵之勝聖僧西歸惟遺雙屐精神不磨竟化為石則有聖蹟內外庵之勝此南門第二支取華頂之紆路以螺溪為界也若夫雲林覆殿寶篋藏經諸天散花神鬼來聽則有慧明寺之勝覺路平平好山相迎谷風溪水且輕且清則有楢溪道中之勝山藏太古水奏琴心惟昔高士允矣知音則有齊高士顧歡隱處之勝水窮山盡有地靈墟盤石可坐精廬可居則有天封寺之勝此東門第一支取華頂之直道以楢溪為界也若夫丹山夷夷草木萎蕤何獨王愛我亦愛之則有王愛山之勝修竹千竿蘭若數楹長者福聚納子化城則有筋竹嶺庵之勝雲生足底人行天上誰挈我衣空中五兩則有彌陀庵仰天湖道中之勝此東門第二支取華頂之仄徑以水母溪為界也若夫山光明媚水色澄鮮真阿練若樂矣三禪則有澄深寺之勝猨梯達漢鳥道通玄疑其登者居日月邊則有摘星嶺之勝山藏八景高僧所安彼如庵主其墖猶完則有大同寺之勝瑞草藉地拱木蔽天禽猨嘯聚杳無人烟則有石筧道中之勝此北門第一支取華頂之峻路以羅木溪為界也若夫神僊福地茅竹洞天金庭觀側羲之家焉則有金庭觀之勝路崎而勝水險而清籃輿竹筏恣我南征則有福溪道中之勝山奇蹟聖佛慈如如豐碑古記元章之書則有慈聖寺之勝方廣覿面伊誰能見八萬度門聊通一線則有石梁橋之勝瀑瀉懸崖石潭淙淙奇哉誰設玄龍之功則有斷橋之勝此北門第二支取華頂之險路以福溪為界也若夫千山倒景蘆荻藏舟中有釣叟機忘海鷗則有青溪之勝青山崔嵬飛流界道織女停梭牛郎凝眺則有瀑布水之勝僊人拍掌玉女濺珠亦有僧寺是稱僊居則有玉女溪瀑布寺福勝觀之勝九峯迢嶤玄宮逍遙僊凡路隔度以三橋則有桐柏宮之勝瓊臺薄漢雙闕凌霄其誰神司僊者王喬則有瓊臺雙闕之勝此上有玄明洞天仁靖純素諸宮白雲壽昌諸觀聖壽法輪法蓮諸院臥雲庵等諸處之勝小山為伍環畬千畝寺倚危峯坎坎鐘皷則有護國寺之勝溪泛胡麻上有僊家雲中古洞尚餘桃花則有桃源之勝其上有慈雲普光西定慧蓮華峯上普慈證教諸寺之勝在焉此西門第一支取華頂之紆路以鬧溪為界也若夫石沼為池石山為城金湯像教功由巨靈則有石城山之勝慈氏寶相百尺停停金光赫奕勤矣三生則有石佛之勝採藥歸來雲仍七世桑梓猶存千年僊系則有劉阮村之勝南有悔山北有悔橋司馬子微悔從帝招則有司馬悔橋之勝將入僊都天為設險險豈在山塵凡難轉則有會墅嶺之勝紫雲蔽野亦翳丹霞異產何物苓朮胡麻則有彩煙山之勝昔人夢遊我亦玄蒐靈僊窟宅葛洪丹丘則有天姥山之勝紅塵白雲僊凡道分石梁捷徑瑞氣氤氳則有石梁道之勝僊人鞭石如牛如馬亦如萬舟蔽流而下則有僊人浪之勝其甘如醴其寒如冰應心之泉有待而興則有應心泉之勝此西門第二左支以黃杜溪為界也關嶺之傍留鄭有坊賢哉邑候尚遺甘棠則有關嶺之勝石室深邃厥名白巖神靈祥瑞余悉其凡則有白巖山之勝萬峯攢翠列如畫屏一溪直界混混流青則有秀溪口之勝奇峯插天翠妝綠翳飛瀑如虹懸崖飄曳則有龍湫瀑布之勝此西門第二右支以秀溪為界也古木千章平田數頃中有梵宮殆絕人境則有萬年寺之勝往者聖僧歸自東海輕駕鐵船其湖猶在則有鐵船湖之勝平田飯僧於是邀請松柏森森為羅漢嶺則有羅漢嶺之勝心外無法滿目青山香爐峯側別開玄關則有通玄峯香爐峯之勝萬八峯頭寺鄰帝座天籟梵音六時叅和則有華頂寺之勝身出五雲天空海濶星辰四垂斗柄可斡則有華頂峯之勝此西門第二支取華頂之康莊也是中有二岐路一至會墅由小路上藤公嶺與萬年會校近十里而景差劣一至萬年過道人坑先往石梁至察嶺頭會校遠五里而景差勝也若夫春日載陽草木生香山花奪目好鳥相將則有春景之勝朱明赫赫樹蔽原隰數里無塵泉流澗側則有夏景之勝涼風振條林木蕭蕭蹲鴟黃獨山家正饒則有秋景之勝玄英司職喧塵時息幽溪泉鳴圓通之宅則有冬景之勝華頂峯頭旭日在下乍沉乍浮魚龍驚詫則有日觀之勝秋蟾皎皎繁露津津上薄林葉萬頃鋪銀則有月觀之勝朝雲矯異高下平填疑清凉界敷兜羅綿則有雲觀之勝江山飄瞥林木皤然珠宮玉闕吾亦神僊則有雪觀之勝黃梅驟雨皷以谷風或如飛瀑有似流虹則有雨觀之勝朝雨初歇霧氣方收千巖競秀萬壑爭流則有霽觀之勝余家幽溪隣于佛隴濟勝之具既揵遊山之仗復備有勝則遊興至則遊不必擇時招友蓋台山之勝無論四時之佳雨霽雪月朝雲暮霞無不可人者昔人以西湖比於西子謂淡妝濃抹總相宜余謂台山之勝故當過之識者必以余為知言然證明此道者要有烟霞之志泉石興趣復須經旬累月不疲足力乃可希覬其或朝入暮出既無笙歌之娛耳復無桃李之豔情以此責台山之不勝余則避席之弗暇焉今依舊志復列山川形勝于左以貽好事者之博蒐妙在觀象得意無得案圖索馬山赤城山在縣北六里一名燒山又曰消山石皆霞色望之如雉堞因以為名山之麓有巖極深廣晉義熙初僧曇猷造寺號中巖齊僧慧明復就塑一佛像名臥佛又有巖曰結集曰釋籤蓋章安荊溪二師裒集解釋天台教文之遺跡也桐柏山在縣西北二十里十二都七十二福地之一由清溪迤北而入嶺路九折至洞門一望佳景豁然道觀屹處其中唐司馬承禎隱此舊圖經云周靈王太子晉主金庭治桐柏山即此也瓊臺雙闕兩山自桐柏西北行二里至元應真人祠取道僊人蹟經龍潭側凡五里至瓊臺轉南三里至雙闕皆翠壁萬仞森依相向宋祥符中山人張無夢結庵於此徐大受山行摘句云大壑之心瓊臺突起嵐光破綠狀如削瓜下俯百丈龍湫心悸骨驚不可近視沿流五里至雙闕幽花凝岸苔茵布石僊家之奇觀也瀑布山一名紫凝在縣西四十里三十二都山有瀑布垂流千丈遙望如布陸羽記云天下第十七水蓋與國清福聖二瀑為三其山產大葉茶志要云福聖之瀑布源出桐柏山金澗三井之泉懸流數百尺落于萬仞之崖冬夏不竭遠而望之瑩白如練懸掛隱暎於蒼崖翠壁之間卒然一視恍若天河之傾瀉也石橋山在縣北五十里十五都兩山相並連亘一百里舊傳五百應真之境有石梁架兩崖間龍形龜背廣不盈咫其上雙澗合流洩為瀑布西流出剡中下臨萬仞飛泉回射危滑欹側狀如橫虹且多莓苔甚滑過者目眩心悸按赤城舊志云凡往來人供茗必有乳花効應或寶炬金雀靈跡梵嚮接于見聞云東橫山在縣東十里八都九都界以其橫據縣東故名狀如覆舟舊名覆舟山四面迥絕無所連接神邕山圖謂為台山之腳其上坦夷可三十頃中有三泉冬溫夏洌側有古淨池今蕪沒山南盡處有石遠望如婦人舊稱為新婦巖山足相傳下有石鴨讖云水打石鴨頭此地出公侯每溪流逼向此山下有顯宦見志要按舊志云丹丘山即東橫山也其山頂方闊萬厯九年知縣毛鸖騰重建丹丘山臺九峯山在縣西北十五里十三都其峯有九徐靈府小錄云瀑布寺前有九峯蓋台山之枝榦舊名九壟王羲之與支遁遊焉唐天寶六年改九峯神邕山圖云此嘗創桐溪寺鳳凰山在縣東十五里六都志要云山形似鳳者三故其地亦名鳳林崖上有僊人掌跡甚鉅南有釣臺及呂洞賓所遊之地名為呂道岸其地夏日蚊蠅不入所產艾草入藥最佳蒼山在縣東四十里五都神邕山圖云其山凌映桐柏絕頂睇滄海以其蒼蒼接漢故名古經云其山鳴吼必有大風雨神邕以桐柏接甯海界在縣東極處非今置觀之桐柏也寒巖山在縣西南七十里三十六都前有盤石曰宴坐峯上有石室舊名撫石洞後米公芾題曰潛真四山環峙如郛郭上矗雲漢其下嵌空置佛屋不用瓦覆洞左有小甎塔是寒山子蟬蛻處山滅後數日有梵僧持錫杖於此尋覓或問其故對曰吾拾文殊舍利也故後人於此而建塔焉由宴坐西有石梁可數尺架兩崖間險峻不可陟南有泉如屋霤寺僧縻竹𦄱引之前距山腹一里有道人洞轉西二里亂石灑流巖竇間散若虬髯因號龍鬚洞台山絕勝處也臨海記云石室前有立石叅差五色遠望如綬帶舊傳為綬帶山產石髓石脂絕杪有僊石棺明巖山在縣西七十里三十三都舊名闇巖巖之前峭壁屹立勢摩窮蒼亦號幽石其下竅穴透邃日光穿漏中有僧全宰棲真洞轉北數步恠石森然上有兩峯倒側號合掌巖西有泉蔽崖而下渙若垂箔寺僧亦用竹𦄱引之從高下墜號曰水索由寺北捫蘿而下至重巖磐石品列即三隱嘯詠之地常有光如月號石月寺東有響巖擊之聲鏗然寒山子詩所謂重巖我卜居鳥道絕人蹟是也大盆山在縣西一百八十里三十七都西接東陽南界僊居遙望山形如覆盆故名天柱山在縣西九十里三十六都南有黃水峯方瀛山在縣西北二十八里十二都由桐柏北上一峯可五里許上有平田十餘畝間以陂池前眺蒼峯後即雲蓋峯唐長慶中徐靈府居此因賜今名繫船山在縣東四十里一都南陽舊傳古煎鹽處有石磐柱尚存有巨石橫亘海波沃日舟人常繫纜於此邑志一名髻山赤城舊志又有髻山在縣東四十里以其形如髻然故名司馬悔山在縣北一十三里十一都道書此為第十六福地會稽志載司馬悔橋在新昌縣舊傳司馬承禎應召至此而悔因以為名又雲笈七籤載司馬悔山在台州府天台山北李明僊人所治之處山在天台新昌二境間故橋以山得名按此則非司馬承禎矣豈嘗有司馬悔者居此而名歟然不可考始豐山在縣西南十五里十九都舊以狀類盤龍名龍山唐天寶中更今名折山在縣西十六里十六都神邕山圖云其山峭𡼑險折而中峯拔立孤秀舊傳王喬控鸖于此又名鸖峯鼻山在縣西南一十五里二十三都以形名載唐書地里志下有龍湫旱禱常應土墻山在縣西四十里二十七都屹若墻立故名見唐地里志峇山在縣西五十里二十九都舊志云在西南一十五里蓋誤甑山在縣西三十五里一十五都下有鈎磯石松山在縣東南四十里二都擔山在縣西南三十五里二十四都招賢山在縣東四十五里一都又名雙峯山焦山在縣西六十里三十四都靈墟山舊志在縣北三十里十一都白雲先生隱處圖經云在縣北六十里蓋七十二福地之一八峯山在縣西北六十里十五都中有萬年寺所謂明月娑羅香爐大舍銅魚藏象烟霞應澤是也牛游山在縣東五十里四都東巖有片石似牛游成渦舊傳神牛浴此蹄跡跧痕尚在俗呼為石牛游覆盆山在縣東四十里一都頂平東西二隅有二井地里家以為台郡臨海山川之美皆是此胚胎迤衍發秀亭山在縣東三十里二都接石山在縣東四十里一都寶華山在縣東三十里四都產花乳石色如瑇瑁瑩潤堅潔可愛李德裕謝寄石詩聞君采奇石翦斷赤城霞宋林逋謝天台僧寄石枕詩斷石自何許枕之懷赤城皆謂此也稍西有雲頂庵距山足一二里有巒岫如帶與溪流俱西向環拱縣境因名帶橫相傳其地唐時有王尚書居此見范志銀山在縣南十里二十都宋元祐間因鑛發故名後因鑿山壓死人眾燒煉無銀遂廢萬厯二十六年凡舊鑛處朝廷悉令開採四月初四日太監委官來鑿此山無銀堪輿家先言此山居午動必致火五月間縣東南果被火灾本年八月復委官開仍無銀二十七年閏四月太監劉同本府黃二守督工深入取砂面烹亦無銀而止菡山在縣西六十里三十五都大淡小淡二山在縣南二十里七都峯勢聯接周回三里龜山在縣南五里山形類龜下有潭極深大旱不竭鯉山與龜山相近澹山在縣西七十里三十五都雷馬山在縣西九十里三十五都方山在縣西六十里三十五都志要云其山高峻千餘丈山麓周圍十五里自足至頂皆方故名遠望山之右有匼溪茁左有青山茁此居其中巔有廟祀鎮之白衣山在縣西五十里三十二都上有白衣殿茶山在縣西八十里三十三都聚青山在縣西五十里三十二都儒堂山又名宰山在縣西四十里三十都鳳山又名赤山在縣西四十里二十七都鷓鴣山在縣西北四十五里十五都中有龍湫志要云常有鷓鴣鳴故名獨山在縣西六十里三十四都千佛山在縣西五十里二十九都山足有寺名廣巖周圍佛剎峯巒壘障層出其上故名斷橋山在縣北七十里十一都自石橋下菴對嶺㳂澗行可十五里則一石梁中斷因以為名即是小石橋也下臨危澗亂石棊布有龍湫龍拖石妙山在縣東一百步延袤一里舊為城隍廟宋曹勛建祐聖觀境民崇奉香火不廢舊有公館改為社學近廢鐘樓在其上山周圍皆民賃以居登山一望則一邑之景致盡在目中蓋邑之鎮山也金墩山在縣西北三里志要云乃赤城山南行支壠盤曲以翼縣治蓋妙山東橫山夾輔邑東此山在西蒼山蔚磐于左赤城輝暎于右邑後諸山高厚峻極而邑前面諸山呈秀爭妍邑治街巷橫列三數成乾卦象也蔓蘿山在縣東北三十里十都甯波府奉化岳林寺文果和尚助英洋壹佰元光緒十九年桂月佛隴真覺寺敏曦監梓
