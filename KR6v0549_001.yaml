body:
  text: 天台山幽溪沙門傳燈撰山名考第一自夫有天地即有人物語言有人物語言則事事物物皆有名謂此山稱名始於何人上古荒𧂀無以稽焉僅可考者始於劉阮名傳後因孫公賦顯海內方知有天台山也正以茲山頂對三辰當牛女分野而上應三台故以名焉顧野王輿地志又云天台山一名桐柏衆嶽之最秀者也徐靈府記又云天台與桐柏接而少異又名赤城瀑布佛隴香爐華頂東蒼要之天台為諸山之總稱若桐柏等衆名乃諸山各隨其勝而別目之即西域記亦云震旦天台石橋方廣寺五百阿羅漢居焉按此則天台之稱其來遠矣又章安禪師山記云本稱南嶽周靈王太子晉居之魂為其神命左右公改為天台山也荊溪禪師云若準孫公山賦云所以不列於五嶽闕載于常典者以其所立幽奧其路曠逈故未知章安所出今姑存之華嚴菩薩住處品又云東南方有處名支提山從昔已來諸菩薩衆於中止住現有菩薩名曰天冠與其眷屬諸菩薩衆一千人俱常住其中而演說法清涼國師謂支提梵語此云可供養處即塔之異稱惟東南方有赤城其形如塔且其巔又有舍利寶塔應是支提據此則石橋方廣為五百應真住處赤城又為天冠菩薩住處然二住處皆天台山內之境惟天台為定名也山源考第二山有來脈水有來源猶人身之有經絡樹木之有根本也水以地載山以水分考山猶當考水知水之所由後能知山之發脈也故堪輿家之言風水云乘風則散界水則止山豈為風水之止散蓋山之為氣風則散水則止耳說者謂中國名山有七而五嶽為尊山自崑崙發源此見其近而未見其遠聞其小而未聞其大也今既許以方外名志而方內之說置而後論可也請試考之謹按佛經須彌山之南大海之中有洲名贍部縱廣七千由旬周圍之可得二十八萬里此以一由旬四十里計之也從遼東西行出陽關踰蔥嶺經五竺盡西海際從南海北行出雁門踰沙漠極北至瀚海皆可九萬里而四方各得四萬五千里之中其地名中天竺國有阿耨達池在香山之南雪山之北周八百里十地菩薩化為龍王於中潛宅出清泠水以給贍部池之東南銀牛口流出兢伽河繞池一匝入東南海池之南面金象口流出信度河繞池一匝入西南海池之西面琉璃馬口流出縛芻河繞池一匝入西北海池之北面頗胝師子口流出徙多河繞池一匝入東北海此第四水為此方黃河之源此水自出池後先經葱嶺為蔥河入蒲菖海潛流地下至積石山復從地湧出為東華黃河之源積石即崑崙山也葛仙翁傳曰崑崙一曰玄圃一曰積石瑤房一曰閬風臺一曰華蓋一曰天柱皆仙人所居也以此而推則阿耨達池為贍部四河之源河水流入四海天下諸山由此四水而界此池之地其形最高為贍部諸山之祖而東華七山五嶽與夫崑崙莫不宗於此也蓋山因水界由阿耨達池之水分天下之山為四支而東華之地當一支焉此徙多河及黃河以南殑伽河以北之地界也自池水分支以後其脈或起或伏伏而為地起而為山而崑崙四傍山麓各入大荒外入中國者一東南支也其支又于塞外分為三支左支環虜庭陰山賀蘭入山西起太行數千里出為醫巫閭庭度遼海而止為北龍中循西番入趨岷山沿岷江左右出江右者包敘州而止江左者北去趨關中脈系大散關左渭右漢中出為終南太華下秦山起嵩高右轉荊山抱淮水左落平原千里起泰山入海為中龍而南龍右出吐蕃之西衍至震旦起而結為峨山次梁州次益州次西南夷次南越次荊州次百越次閩中次豫章次吳越建業同一脈也衍至荊州起而結為南嶽自南嶽東至庾嶺又分三支北則豫章而下結為匡廬南則張為全粵而盡羅浮中則甌越翔武夷常山又為濲水所分溪之左為浙西溪之右為浙東過爛柯太末至栝蒼起頂南支仙都石門玉甑雁蕩海門環抱於台之東南北支金華屏峙於台之西北其正東一支至大盆山一化而為玉山再化而為天台玉山又為兩支北支衍為會稽秦望蓋自九里坑發源至嵊縣出曹江東支過關嶺復大起之結為天台說者謂關嶺回支起天姥護峽而止不知天姥為石城之胚胎自萬年藤公嶺發脈已為仙人浪黃杜溪截斷是天台西北幹也關嶺過脈處北以黃杜南以左溪界水極分明台山竣拔如海中巨浪陡然一躍纖悉頓足不必論其前後凡結為九大峯中為華頂峯東為摘星峯東南為東蒼峯南為獅子峯西南為大雷峯西為葛閬峯西北為香爐峯北為香柏峯東北為菩提峯摘星峯分為兩支一至緱城發為長汀勾章諸山屆東海大嵩管江而止者左龍也一至緱城發為象邑諸山屆大瀛海而止者右龍也東蒼峯亦分兩支一由王愛山過桑洲至東嶴清渚沿海而止者左龍也一於棐木村跌斷穿青山頭覆盆山迤衍入大固山孕臨海山川之秀屆章安芙蓉桃渚健跳周水亭傍而止者右龍也獅子峯為歡嶴九析峯東橫山之龍屆大溪而止大雷峯亦分兩支左為修禪太平高明三寺之龍屆幽溪螺溪而止右為真覺後明清心傳教四寺之龍開洋為縣治屆大溪而止葛閬峯亦分兩支左為國清赤城山之龍右為桐柏山之龍屆南嶴溪靈溪清溪而止香爐峯為護國寺桃源諸山之龍屆左溪秀溪而止香柏峯為慈聖萬年金庭上虞諸山之龍屆剡溪娥江而止菩提峯為姚江慈水定海諸山之龍屆招寶山東北大海而止是知天台山者東瀕大海界水而止為東南一大結局而父於南嶽祖於峨山曾於崑崙高於雪山自雪山東南而下不減四五萬里其中所有靈粹之氣莫不畢集於此為神仙之窟宅羅漢之道場間生聖賢養育英哲豈徒然哉山體考第三夫桎梏之士因泉石成膏肓解脫之賓以山林為藥石其故何哉見道不見道忘山不忘山異也不見道則滿目皆山能忘山則觸途皆道若庖丁之解牛始解之時所見無非牛者三年之後未嘗見全牛也然不見全牛猶有乎牛未忘牛也同乎不見全山猶有乎山未忘山也能忘乎山斯見道矣有道之可見未忘道也見道亦忘真見道矣是則忘山者易忘道者難能忘道者其惟如來乎或曰忘山有道乎曰忘山之道莫貴乎見性見性之道莫先乎明心性其猶鏡也心其猶明也鏡明同耶異耶離明無鏡離鏡無明同也鏡為明體明為鏡用異也以其同者觀乎異非異也以其異者觀乎同非同也亦不以非同非異見惟見乎心性而已矣不見而見無所不見終日見終日心性吾亦不知孰為見孰為心性吾將見與心性同歸於絶待之道而已矣或曰請問心性曰心性之光明也性之所由顯也性心之本體也心之所由生也性之為德具大覺知體包太虛量周沙界非首非尾非上非下非邊非中非去非來非今非古非生非滅非作非為非同非異非彼非此非能非所非淨非垢非明非暗非有非無非雙亦有無非雙非有無非增非減非動非靜非短非長非缺非剩非方非圓非大非小非倒非正非隱非顯非合非離非一非二非本非末非生非佛非聖非凡非賢非愚非迷非悟非體非用非苦非樂非成非敗非縛非脫非理非事非真非妄非境非觀非機非應非依非止非粗非妙非久非近非迹非本非實非虛非性非相非常非斷非人非我非修非證非因非果非根非塵非色非空非世非出世彼首者不能尾彼尾者不能首以至彼世者不能出世彼出世者不能世惟其非首尾者能首能尾非世出世者能世出世故性之為德也能首能尾能上能下能邊能中以至能世出世故性之為德無法不具無法不攝無法不能惟隨緣何如耳故華嚴云能隨染淨緣具造十法界楞嚴云隨衆生心應所知量循業發現故性之為體隨淨緣時則為佛為聖為悟為體為用為成為解脫為即事之理為即理之事為真為應為妙依正為久為近為說為默為迹為本為實為妙為性為相為常為樂為我為淨為出世故性之為體隨染緣時則為首為尾為上為下為邊為中為去為來為古為今為生為滅為作為為為同為異為彼為此為能為所為垢為淨為明為暗為有為無為雙亦雙非有無為增為減為動為靜為短為長為缺為剩為方為圓為大為小為倒為正為隱為顯為合為離為二為一為本為末為聖為凡為迷為愚為苦為成為敗為縛為理為事為妄為境為觀為依為止為粗為虛為斷為人為我為根為塵為因為果為世間法以至為泉為石為林為野為烟為霞是以為佛為聖為淨為悟等者性之能事也即其為衆生為迷為染為苦為縛等亦性之能事也性之能事而為之非勉強也皆稱性之所施設者也惟其稱性施設故事事物物皆法界之全體也故曰剎海法性不大一塵法性不小多亦法性少亦法性故約迷情觀事物有大小方圓之殊約道眼觀事物惟廣大法性而已故曰為物所轉故於是中觀大觀小若能轉物即同如來或曰性體已聞命矣心之為用尚請言之曰體惟一性而已矣餘皆性之用也何獨惟心第迷情日久親疏碩分以內身對外物則內身為親外物為疏以身對心則心為親身為疏蓋外物無覺知內身則異此然內身之有覺知者由心之使然也故心在身則有覺知離則同乎木石矣故外物疏之至疏者也心親之至親者也故言心為用切近而易指言他為用疏遠而難明今就近易之心以指性德之用緣用以明體其猶緣明以求鏡不亦易乎故曰見性莫要乎明心心之為用似有待也性之為體故無待也全性體以為心用彼有待即無得矣故彼山之巃嵸吾眼之可見者也水之潺湲吾耳之可聞者也花之馥𩡏吾鼻之可嗅者也泉之鮮冽吾舌之可嘗者也谷風之溫涼吾身之可覺者也五者之法塵吾意之可知者也此六知根又心之用也總而為之官者心也心王之所以擾擾者六塵為之賊也由茲六根賊媒之使然也故經曰六為媒賊自劫家寶彼六塵者果賊邪非賊耶彼六根者果媒邪非媒邪彼六塵非六賊六根之使然也彼六根非賊媒心王之不能御也王苟能御彼將為清淨六根與夫淨妙六塵矣何妄之有哉經云見與見緣并所想相如虛空花本無所有元是菩提妙淨明體非此之謂乎是以善見道者即心以見性善明心者即物以明心其猶善見面者即明以觀鏡善矚明者即像以求明故曰性其猶鏡也心其猶明也彼山川泉石與夫一切事物非像之謂乎彼鏡有實體也明有實用也像則無實質也以譬乎性有實體也心有實用也萬物無實質矣像無實質由形對而生同乎物無實體由性具而有善觀鏡者不取彼像之有無惟鑑吾面之妍醜以譬夫善見道者不取物之是非惟見吾性之廣大寂照而已故彼解脫之賓以山林為藥石者樹吾光明之臺朗吾寂照之境形對像生了罔陳跡吾亦不知孰為山也孰為水也孰為林木也孰為泉石也孰為烟霞也孰為白雲也然而何非山也何非水也何非林木也何非泉石也何非烟霞也何非白雲也離即離非是即非即惟學如來以道眼觀之者有以明之也
